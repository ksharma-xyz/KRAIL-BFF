syntax = "proto3";

package app.krail.bff.trackdata;

// Server-internal tracking datasets (TRACKING_DESIGN.md §7a), consumed
// in-memory by the BFF's TrackDatasetStore. Built weekly by the KRAIL-GTFS
// repo (track-dataset.yml -> rolling track-latest release). Field numbers
// and types are a WIRE CONTRACT with the builder schema there
// (KRAIL-GTFS src/main/proto/TrackDataset.proto) — change both together
// or not at all. Never exposed to the app — the public contract stays in
// krail-api-proto.

// Platform-level stop directory: every stop row from the NSW GTFS static
// bundles (location_type 0 stops/platforms AND 1 stations), raw GTFS ids.
// Exists because GTFS-R reports PLATFORM ids for trains while the bundled
// search dataset carries parents + bus stops only.
message TrackStopsDataset {
  string version = 1;       // YYYYMMDD, matches the release tag
  string generated_at = 2;  // ISO-8601 UTC
  string attribution = 3;
  repeated TrackStop stops = 4;
}

message TrackStop {
  string stop_id = 1;    // raw GTFS id, exactly as GTFS-R reports it
  string name = 2;       // render-ready, e.g. "Central Station Platform 16"
  string parent_id = 3;  // stops.txt parent_station; empty for top-level
  double lat = 4;
  double lon = 5;
}

// Per-mode route geometry: trips.txt + shapes.txt joined and deduped.
// Thousands of trips share a handful of shapes — shapes are stored once,
// trips index into them.
message ShapesDataset {
  string version = 1;
  string feed = 2;  // static bundle key: "sydneytrains", "metro", "lightrail", ...

  // shape_id -> Google encoded polyline, precision 5. Kept encoded at
  // rest AND in BFF memory — the BFF never decodes, it just copies the
  // string into LegGeometry.encoded_polyline.
  map<string, string> shapes = 3;

  // trip_id -> shape_id. The realtime trip_id is the lookup key.
  map<string, string> trip_index = 4;
}
