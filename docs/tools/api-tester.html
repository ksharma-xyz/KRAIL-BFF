<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KRAIL-BFF · screen-first tester</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #1c2128;
    --panel-elev: #22272e;
    --border: #373e47;
    --fg: #cdd9e5;
    --muted: #768390;
    --accent: #4493f8;
    --accent-soft: #1f6feb40;
    --ok: #3fb950;
    --warn: #d29922;
    --err: #f85149;
    --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); margin: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  a { color: var(--accent); }
  code, pre { font-family: var(--mono); }

  header { margin-bottom: 24px; }
  header h1 { font-size: 18px; margin: 0 0 4px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }

  .config {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    margin: 12px 0 24px;
    padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  }
  .config label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .config input {
    padding: 5px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--fg); font: 12px var(--mono);
    min-width: 200px;
  }
  .config input:focus { outline: none; border-color: var(--accent); }

  /* Screen tabs */
  .screens { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .screen-tab {
    padding: 10px 16px; background: transparent;
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); cursor: pointer; font-size: 13px;
    font-weight: 500;
  }
  .screen-tab:hover { color: var(--fg); border-color: var(--accent-soft); }
  .screen-tab.active {
    background: var(--accent-soft); border-color: var(--accent);
    color: var(--fg);
  }
  .screen-tab .pill {
    margin-left: 8px;
    padding: 1px 6px; border-radius: 10px;
    background: var(--bg); color: var(--muted); font-size: 10px; font-family: var(--mono);
  }

  .screen-desc {
    color: var(--muted); font-size: 13px;
    margin-bottom: 16px;
  }

  /* Inputs */
  .inputs {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px; margin-bottom: 16px;
  }
  .inputs h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0 0 12px; }
  .inputs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .inputs label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .inputs input {
    width: 100%; padding: 6px 8px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--fg); font: 12px var(--mono);
  }
  .inputs input:focus { outline: none; border-color: var(--accent); }
  .inputs .actions { margin-top: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-primary {
    background: var(--accent); color: white; border: 0;
    padding: 8px 18px; border-radius: 4px;
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .btn-primary:hover { background: #3683e1; }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }
  .btn-link {
    background: transparent; border: 0; color: var(--accent);
    cursor: pointer; font-size: 12px; padding: 6px 0;
  }
  .btn-link:hover { text-decoration: underline; }
  .inputs .hint { color: var(--muted); font-size: 11px; }

  /* Result cards */
  .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px;
  }
  .card.idle { opacity: 0.5; }
  .card.err { border-color: var(--err); }
  .card .ribbon {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin-bottom: 8px;
    display: flex; gap: 6px; align-items: center;
  }
  .card .ribbon .badge {
    padding: 2px 6px; border-radius: 2px;
    background: var(--accent-soft); color: var(--accent);
    font-weight: 600; font-size: 10px;
  }
  .card .ribbon .run-one {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border); border-radius: 3px;
    color: var(--muted); cursor: pointer;
    padding: 2px 8px; font-size: 10px;
    font-family: var(--mono); text-transform: none; letter-spacing: 0;
  }
  .card .ribbon .run-one:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .card .ribbon .run-one:disabled { opacity: 0.5; cursor: wait; }
  .card h3 { font-size: 14px; margin: 0 0 6px; font-weight: 500; }
  .card .url {
    font: 11px var(--mono); color: var(--muted);
    word-break: break-all;
    margin-bottom: 12px;
    max-height: 36px; overflow: hidden;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 10px;
    margin-bottom: 10px;
  }
  .stat { font-family: var(--mono); }
  .stat .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .value { font-size: 16px; font-weight: 600; }
  .stat.ok .value { color: var(--ok); }
  .stat.err .value { color: var(--err); }
  .stat.warn .value { color: var(--warn); }
  .stat .sub { font-size: 11px; color: var(--muted); }

  .card .card-actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .card .card-actions button {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 8px; border-radius: 3px; cursor: pointer; font: 10px var(--mono);
  }
  .card .card-actions button:hover { border-color: var(--accent); color: var(--accent); }

  details.body-detail {
    margin-top: 10px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg);
  }
  details.body-detail summary {
    list-style: none; cursor: pointer; padding: 6px 10px;
    color: var(--muted); font-size: 11px;
  }
  details.body-detail summary::-webkit-details-marker { display: none; }
  details.body-detail summary::before { content: '▸ '; }
  details.body-detail[open] summary::before { content: '▾ '; }
  details.body-detail pre {
    margin: 0; padding: 10px;
    font: 11px var(--mono); white-space: pre-wrap; word-break: break-all;
    border-top: 1px solid var(--border);
    max-height: 60vh; overflow: auto;
  }

  /* Summary panel */
  .summary {
    background: linear-gradient(180deg, rgba(68, 147, 248, 0.08), rgba(68, 147, 248, 0.02));
    border: 1px solid var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 6px; padding: 14px 18px;
    margin-bottom: 24px;
  }
  .summary h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--accent); margin: 0 0 10px;
  }
  .summary table { width: 100%; border-collapse: collapse; font: 13px var(--mono); }
  .summary th, .summary td { text-align: left; padding: 4px 8px 4px 0; }
  .summary th { color: var(--muted); font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .summary td.savings { font-weight: 600; }
  .summary td.win { color: var(--ok); }
  .summary td.neutral { color: var(--muted); }
  .summary td.loss { color: var(--warn); }
  .summary .note { color: var(--muted); font-size: 11px; margin-top: 10px; font-style: italic; }

  /* Custom debug section */
  details.debug-section {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    margin-top: 32px;
  }
  details.debug-section summary {
    list-style: none; cursor: pointer; padding: 12px 16px;
    color: var(--muted); font-size: 13px;
  }
  details.debug-section summary::-webkit-details-marker { display: none; }
  details.debug-section summary::before { content: '▸ '; }
  details.debug-section[open] summary::before { content: '▾ '; }
  details.debug-section .debug-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }
  details.debug-section textarea {
    width: 100%; min-height: 80px; padding: 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--fg); font: 12px var(--mono); resize: vertical;
    margin: 10px 0;
  }

  .pill-ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
  .pill-err { background: rgba(248, 81, 73, 0.15); color: var(--err); padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
  .pill-warn { background: rgba(210, 153, 34, 0.15); color: var(--warn); padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>KRAIL-BFF · screen-first tester</h1>
  <div class="sub">Pick a KRAIL screen below. The tester fires every path that screen exercises in parallel and shows you the deltas.</div>
</header>

<div class="config">
  <label>Base URL <input id="baseUrl" value="http://localhost:8080"></label>
  <label>X-Krail-Version <input id="version" placeholder="optional"></label>
</div>

<div class="screens" id="screens"></div>
<div class="screen-desc" id="screenDesc"></div>

<section class="inputs">
  <h2>Inputs</h2>
  <div class="inputs-grid" id="inputs"></div>
  <div class="actions">
    <button class="btn-primary" id="runAll">Run all paths</button>
    <span class="hint" id="runHint"></span>
  </div>
</section>

<section class="results" id="results"></section>

<section class="summary" id="summary" style="display: none;">
  <h2>Wire-size deltas</h2>
  <div id="summaryBody"></div>
</section>

<details class="debug-section">
  <summary>Debug any URL or curl</summary>
  <div class="debug-body">
    <textarea id="debugInput" placeholder="Paste a URL (any host) or a curl command. NSW URLs are auto-routed through /internal/passthrough."></textarea>
    <button class="btn-primary" id="debugRun">Fire</button>
    <div id="debugResult"></div>
  </div>
</details>

<script>
'use strict';

// ---------------------------------------------------------------------------
// Screens — one entry per KRAIL screen. Each defines:
//   inputs:   form fields { name, label, placeholder, default }
//   paths:    array of paths to fire in parallel { id, label, kind, build }
//             kind: 'bff-json' | 'bff-proto' | 'nsw'
//             build({base, inputs}) returns the absolute URL to fetch
// ---------------------------------------------------------------------------
const SCREENS = [
  {
    id: 'trip',
    title: 'Trip results',
    desc: 'TimeTableScreen — searches NSW trip planner, draws journey cards + journey map polyline.',
    inputs: [
      { name: 'origin', label: 'Origin stop', default: '200070', placeholder: '200070 (Town Hall)' },
      { name: 'destination', label: 'Destination stop', default: '215020', placeholder: '215020 (Bondi Junction)' },
      { name: 'depArr', label: 'Mode', default: 'dep', placeholder: 'dep | arr' },
    ],
    paths: [
      {
        id: 'nsw',
        label: 'NSW direct',
        kind: 'nsw',
        binary: false,
        build: ({ i }) =>
          `https://api.transport.nsw.gov.au/v1/tp/trip?name_origin=${i.origin}&name_destination=${i.destination}` +
          `&depArrMacro=${i.depArr || 'dep'}&type_destination=any&calcNumberOfTrips=6&type_origin=any` +
          `&TfNSWTR=true&version=10.2.1.42&coordOutputFormat=EPSG:4326&itOptionsActive=1` +
          `&computeMonomodalTripBicycle=false&cycleSpeed=16&useElevationData=1&outputFormat=rapidJSON`,
      },
      {
        id: 'bff-json',
        label: 'BFF JSON',
        kind: 'bff-json',
        binary: false,
        build: ({ base, i }) =>
          `${base}/v1/tp/trip?name_origin=${i.origin}&name_destination=${i.destination}` +
          `&depArrMacro=${i.depArr || 'dep'}&type_destination=any&calcNumberOfTrips=6&type_origin=any` +
          `&TfNSWTR=true&version=10.2.1.42&coordOutputFormat=EPSG:4326&itOptionsActive=1` +
          `&computeMonomodalTripBicycle=false&cycleSpeed=16&useElevationData=1&outputFormat=rapidJSON`,
      },
      {
        id: 'bff-proto',
        label: 'BFF proto',
        kind: 'bff-proto',
        binary: true,
        build: ({ base, i }) =>
          `${base}/api/v1/trip/plan-proto?origin=${i.origin}&destination=${i.destination}&depArr=${i.depArr || 'dep'}`,
      },
    ],
  },
  {
    id: 'departures',
    title: 'Departures',
    desc: 'Saved Trips card — fetches next departures for a stop. JSON pass-through is NSW shape verbatim; proto is screen-shaped (line + destination + time + platform).',
    inputs: [
      { name: 'stopId', label: 'Stop ID', default: '200060', placeholder: '200060' },
      { name: 'date', label: 'Date (YYYYMMDD)', default: '', placeholder: 'optional' },
      { name: 'time', label: 'Time (HHmm)', default: '', placeholder: 'optional' },
    ],
    paths: [
      {
        id: 'nsw',
        label: 'NSW direct',
        kind: 'nsw',
        binary: false,
        build: ({ i }) => {
          let u = `https://api.transport.nsw.gov.au/v1/tp/departure_mon?name_dm=${i.stopId}` +
            `&type_dm=any&mode=direct&excludedMeans=checkbox&limit=20` +
            `&outputFormat=rapidJSON&coordOutputFormat=EPSG:4326&TfNSWDM=true&version=10.2.1.42`;
          if (i.date) u += `&itdDate=${i.date}`;
          if (i.time) u += `&itdTime=${i.time}`;
          return u;
        },
      },
      {
        id: 'bff-json',
        label: 'BFF JSON',
        kind: 'bff-json',
        binary: false,
        build: ({ base, i }) => {
          let u = `${base}/v1/stops/${i.stopId}/departures`;
          const qs = [];
          if (i.date) qs.push(`date=${i.date}`);
          if (i.time) qs.push(`time=${i.time}`);
          if (qs.length) u += '?' + qs.join('&');
          return u;
        },
      },
      {
        id: 'bff-proto',
        label: 'BFF proto',
        kind: 'bff-proto',
        binary: true,
        build: ({ base, i }) => {
          let u = `${base}/api/v1/stops/${i.stopId}/departures-proto`;
          const qs = [];
          if (i.date) qs.push(`date=${i.date}`);
          if (i.time) qs.push(`time=${i.time}`);
          if (qs.length) u += '?' + qs.join('&');
          return u;
        },
      },
    ],
  },
  {
    id: 'parking',
    title: 'Park & Ride',
    desc: 'Home parking cards — fan-out per saved-trip stop. No single NSW URL matches (each stop becomes N upstream calls), so we compare proto vs the BFF JSON variant of the same query.',
    inputs: [
      { name: 'stopIds', label: 'Stop IDs (comma)', default: '2155384,275010', placeholder: '2155384,275010' },
    ],
    paths: [
      {
        id: 'bff-json',
        label: 'BFF JSON',
        kind: 'bff-json',
        binary: false,
        build: ({ base, i }) => `${base}/v1/parking/availability?stopIds=${encodeURIComponent(i.stopIds)}`,
      },
      {
        id: 'bff-proto',
        label: 'BFF proto',
        kind: 'bff-proto',
        binary: true,
        build: ({ base, i }) => `${base}/api/v1/parking/availability-proto?stopIds=${encodeURIComponent(i.stopIds)}`,
      },
    ],
  },
  {
    id: 'tracking',
    title: 'Live tracking',
    desc: 'TrackTripScreen / JourneyMapScreen — GTFS-RT polling. BFF is byte-for-byte upstream protobuf pass-through; no proto-vs-JSON delta exists.',
    inputs: [
      { name: 'feed', label: 'Feed', default: 'sydneytrains', placeholder: 'sydneytrains' },
      { name: 'kind', label: 'Kind', default: 'vehiclepos', placeholder: 'vehiclepos | realtime' },
    ],
    paths: [
      {
        id: 'nsw',
        label: 'NSW direct',
        kind: 'nsw',
        binary: true,
        build: ({ i }) => {
          const isV2 = i.feed === 'sydneytrains' || i.feed === 'metro';
          const v = isV2 ? 'v2' : 'v1';
          return i.kind === 'vehiclepos'
            ? `https://api.transport.nsw.gov.au/v2/gtfs/vehiclepos/${i.feed}`
            : `https://api.transport.nsw.gov.au/${v}/gtfs/realtime/${i.feed}`;
        },
      },
      {
        id: 'bff',
        label: 'BFF (pass-through)',
        kind: 'bff-proto',
        binary: true,
        build: ({ base, i }) => {
          const isV2 = i.feed === 'sydneytrains' || i.feed === 'metro';
          const v = isV2 ? 'v2' : 'v1';
          return i.kind === 'vehiclepos'
            ? `${base}/v2/gtfs/vehiclepos/${i.feed}`
            : `${base}/${v}/gtfs/realtime/${i.feed}`;
        },
      },
    ],
  },
];

// ---------------------------------------------------------------------------
// State + UI binding.
// ---------------------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const ss = window.sessionStorage;

let activeScreenId = ss.getItem('screen') || SCREENS[0].id;

function activeScreen() { return SCREENS.find(s => s.id === activeScreenId) || SCREENS[0]; }

function renderScreens() {
  $('screens').innerHTML = SCREENS.map(s => `
    <button class="screen-tab ${s.id === activeScreenId ? 'active' : ''}" data-id="${s.id}">
      ${s.title}<span class="pill">${s.paths.length}</span>
    </button>
  `).join('');
  $('screens').querySelectorAll('.screen-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeScreenId = btn.dataset.id;
      ss.setItem('screen', activeScreenId);
      renderAll();
    });
  });
}

function renderInputs() {
  const s = activeScreen();
  $('screenDesc').textContent = s.desc;
  $('inputs').innerHTML = s.inputs.map(input => {
    const stored = ss.getItem(`input:${s.id}:${input.name}`);
    const v = stored !== null ? stored : (input.default || '');
    return `
      <div>
        <label for="in-${input.name}">${input.label}</label>
        <input id="in-${input.name}" data-name="${input.name}" value="${esc(v)}" placeholder="${esc(input.placeholder || '')}">
      </div>
    `;
  }).join('');
  $('inputs').querySelectorAll('input').forEach(el => {
    el.addEventListener('input', () => ss.setItem(`input:${s.id}:${el.dataset.name}`, el.value));
  });
}

function renderResultsSkeleton() {
  const s = activeScreen();
  $('results').innerHTML = s.paths.map(p => `
    <div class="card idle" data-id="${p.id}">
      <div class="ribbon">
        <span class="badge">${p.label}</span>
        <button class="run-one" data-id="${p.id}" title="Fire only this path">Run</button>
      </div>
      <h3>${p.label}</h3>
      <div class="url" data-url-slot></div>
      <div class="stat-grid">
        <div class="stat"><div class="label">Status</div><div class="value">—</div></div>
        <div class="stat"><div class="label">Latency</div><div class="value">—</div></div>
        <div class="stat"><div class="label">Body</div><div class="value">—</div></div>
        <div class="stat"><div class="label">Wire (gz)</div><div class="value">—</div></div>
      </div>
    </div>
  `).join('');
  $('summary').style.display = 'none';
  $('summaryBody').innerHTML = '';
  bindCardRunButtons();
}

function bindCardRunButtons() {
  document.querySelectorAll('.card .run-one').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      runOne(btn.dataset.id);
    });
  });
}

function readInputs() {
  const s = activeScreen();
  const i = {};
  s.inputs.forEach(input => {
    const el = $(`in-${input.name}`);
    i[input.name] = (el ? el.value : input.default || '').trim();
  });
  return i;
}

// ---------------------------------------------------------------------------
// HTTP firing.
// ---------------------------------------------------------------------------
async function rawFetch(url, { binary = false } = {}) {
  const t0 = performance.now();
  let response;
  try {
    response = await fetch(url, { headers: optHeaders() });
  } catch (e) {
    return { url, error: e.message || String(e), elapsed: Math.round(performance.now() - t0) };
  }
  const elapsed = Math.round(performance.now() - t0);

  const buf = await response.arrayBuffer();
  const ct = response.headers.get('Content-Type') || '';
  const decodedBytes = buf.byteLength;

  let body;
  const isJsonish = ct.includes('json') || ct.includes('text');
  const isProtoish = ct.includes('protobuf');
  if (binary || isProtoish) {
    body = `<binary, ${decodedBytes} bytes>\n\n${hexPreview(new Uint8Array(buf), 256)}`;
  } else if (isJsonish) {
    const text = new TextDecoder().decode(buf);
    try { body = JSON.stringify(JSON.parse(text), null, 2); } catch { body = text; }
  } else {
    body = new TextDecoder().decode(buf);
  }

  // Wire size via Resource Timing.
  let encodedBodySize = null;
  try {
    const entries = performance.getEntriesByName(url);
    const last = entries[entries.length - 1];
    if (last && typeof last.encodedBodySize === 'number') encodedBodySize = last.encodedBodySize;
  } catch {}

  return {
    url, status: response.status, statusText: response.statusText,
    elapsed, decodedBytes, encodedBodySize, body,
  };
}

function optHeaders() {
  const h = {};
  const v = ($('version').value || '').trim();
  if (v) h['X-Krail-Version'] = v;
  return h;
}

/**
 * Resolve a path's URL: build via screen-config, then wrap NSW URLs in
 * /internal/passthrough so the browser doesn't choke on missing CORS.
 */
function resolveUrl(path, base, inputs) {
  const raw = path.build({ base, i: inputs });
  if (path.kind === 'nsw') {
    return `${base}/internal/passthrough?url=${encodeURIComponent(raw)}`;
  }
  return raw;
}

// ---------------------------------------------------------------------------
// Run all paths in parallel + render results + summary.
// ---------------------------------------------------------------------------
async function runAll() {
  const s = activeScreen();
  const inputs = readInputs();
  const base = ($('baseUrl').value || 'http://localhost:8080').replace(/\/+$/, '');

  // Validate required inputs.
  for (const input of s.inputs) {
    if (!input.default && !inputs[input.name]) continue; // optional
    if (input.default && !inputs[input.name]) {
      $('runHint').textContent = `Need a value for ${input.label}.`;
      return;
    }
  }

  $('runAll').disabled = true;
  $('runAll').textContent = 'Running…';
  $('runHint').textContent = '';
  renderResultsSkeleton();

  // Stamp each card with its displayed URL up-front.
  s.paths.forEach(p => {
    const card = document.querySelector(`.card[data-id="${p.id}"]`);
    if (!card) return;
    const rawUrl = p.build({ base, i: inputs });
    card.querySelector('[data-url-slot]').textContent = rawUrl;
  });

  // Fire all in parallel.
  const fetches = s.paths.map(p => {
    const url = resolveUrl(p, base, inputs);
    return rawFetch(url, { binary: p.binary }).then(r => ({ path: p, r }));
  });
  const settled = await Promise.allSettled(fetches);

  // Render each card.
  const results = [];
  settled.forEach((res, idx) => {
    const p = s.paths[idx];
    const r = res.status === 'fulfilled' ? res.value.r : { error: res.reason?.message || String(res.reason) };
    renderCard(p, r);
    results.push({ path: p, r });
  });

  renderSummary(results);

  $('runAll').disabled = false;
  $('runAll').textContent = 'Run all paths';
}

function renderCard(path, r) {
  const card = document.querySelector(`.card[data-id="${path.id}"]`);
  if (!card) return;
  card.classList.remove('idle');
  if (r.error) {
    card.classList.add('err');
    card.innerHTML = `
      <div class="ribbon">
        <span class="badge">${esc(path.label)}</span>
        <button class="run-one" data-id="${path.id}">Run</button>
      </div>
      <h3>${esc(path.label)}</h3>
      <div class="url">${esc(path.build({ base: $('baseUrl').value.replace(/\/+$/, ''), i: readInputs() }))}</div>
      <div class="stat-grid">
        <div class="stat err"><div class="label">Status</div><div class="value">NET ERROR</div></div>
        <div class="stat"><div class="label">Latency</div><div class="value">—</div></div>
      </div>
      <details class="body-detail"><summary>Error</summary><pre>${esc(r.error)}</pre></details>
    `;
    bindCardRunButtons();
    return;
  }

  const okCls = r.status >= 200 && r.status < 400 ? 'ok' : 'err';
  const statusPill = okCls === 'ok' ? 'pill-ok' : 'pill-err';
  const wire = r.encodedBodySize != null && r.encodedBodySize > 0 ? fmtBytes(r.encodedBodySize) : '—';

  card.innerHTML = `
    <div class="ribbon">
      <span class="badge">${esc(path.label)}</span>
      <span class="${statusPill}">${r.status}</span>
      <button class="run-one" data-id="${path.id}" title="Re-run only this path">Re-run</button>
    </div>
    <h3>${esc(path.label)}</h3>
    <div class="url">${esc(path.build({ base: $('baseUrl').value.replace(/\/+$/, ''), i: readInputs() }))}</div>
    <div class="stat-grid">
      <div class="stat ${okCls}"><div class="label">Status</div><div class="value">${r.status}</div><div class="sub">${esc(r.statusText || '')}</div></div>
      <div class="stat"><div class="label">Latency</div><div class="value">${r.elapsed}<span style="font-size:11px;color:var(--muted)"> ms</span></div></div>
      <div class="stat"><div class="label">Body</div><div class="value">${fmtBytes(r.decodedBytes)}</div></div>
      <div class="stat"><div class="label">Wire (gz)</div><div class="value">${wire}</div></div>
    </div>
    <div class="card-actions">
      <button class="cp-url">Copy URL</button>
      <button class="cp-body">Copy body</button>
    </div>
    <details class="body-detail"><summary>Response body (${fmtBytes(r.decodedBytes)})</summary><pre>${esc(r.body)}</pre></details>
  `;

  // Wire copy + re-run buttons on this card.
  card.querySelector('.cp-url').addEventListener('click', () => navigator.clipboard.writeText(r.url));
  card.querySelector('.cp-body').addEventListener('click', () => navigator.clipboard.writeText(r.body));
  bindCardRunButtons();
}

/**
 * Fire exactly one path. Used by the Run / Re-run buttons in each card.
 * Doesn't refresh the deltas table — that needs at least 2 fresh results.
 */
async function runOne(pathId) {
  const s = activeScreen();
  const path = s.paths.find(p => p.id === pathId);
  if (!path) return;
  const inputs = readInputs();
  const base = ($('baseUrl').value || 'http://localhost:8080').replace(/\/+$/, '');

  // Mark the card busy via the button text.
  const btn = document.querySelector(`.card[data-id="${pathId}"] .run-one`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  const url = resolveUrl(path, base, inputs);
  const r = await rawFetch(url, { binary: path.binary });
  renderCard(path, r);
}

/**
 * Build the deltas table: for each pair of paths in the screen, show
 * what the size delta + savings % is. We prefer "vs NSW" comparisons
 * when an NSW path is present, else "vs BFF JSON".
 */
function renderSummary(results) {
  const ok = results.filter(({ r }) => r && !r.error && r.status >= 200 && r.status < 400);
  if (ok.length < 2) {
    $('summary').style.display = 'none';
    return;
  }

  // Pick the baseline:
  //   - NSW direct if present (the "what would have been transferred" baseline)
  //   - else BFF JSON
  const baseline = ok.find(({ path }) => path.kind === 'nsw')
    || ok.find(({ path }) => path.kind === 'bff-json')
    || ok[0];

  const rows = ok.filter(o => o.path.id !== baseline.path.id).map(({ path, r }) => {
    const dRaw = pct(baseline.r.decodedBytes, r.decodedBytes);
    const dWire = (baseline.r.encodedBodySize && r.encodedBodySize)
      ? pct(baseline.r.encodedBodySize, r.encodedBodySize)
      : null;
    const dLatency = r.elapsed - baseline.r.elapsed;
    return {
      label: path.label, dRaw, dWire, dLatency,
      thisRaw: r.decodedBytes, thisWire: r.encodedBodySize,
      baseRaw: baseline.r.decodedBytes, baseWire: baseline.r.encodedBodySize,
    };
  });

  if (!rows.length) {
    $('summary').style.display = 'none';
    return;
  }

  const headerLatency = '<th>Latency Δ</th>';
  const html = `
    <table>
      <thead>
        <tr>
          <th>vs ${esc(baseline.path.label)}</th>
          <th>Body</th>
          <th>Wire (gz)</th>
          ${headerLatency}
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const rawCls = r.dRaw == null ? 'neutral' : (r.dRaw <= -5 ? 'win' : r.dRaw >= 5 ? 'loss' : 'neutral');
          const wireCls = r.dWire == null ? 'neutral' : (r.dWire <= -5 ? 'win' : r.dWire >= 5 ? 'loss' : 'neutral');
          const latCls = r.dLatency == null ? 'neutral' : (r.dLatency <= -25 ? 'win' : r.dLatency >= 25 ? 'loss' : 'neutral');
          return `
          <tr>
            <td>${esc(r.label)}</td>
            <td class="savings ${rawCls}">${fmtSavings(r.dRaw)} <span style="color:var(--muted);font-weight:400">(${fmtBytes(r.thisRaw)} vs ${fmtBytes(r.baseRaw)})</span></td>
            <td class="savings ${wireCls}">${r.dWire == null ? '—' : fmtSavings(r.dWire)} ${r.thisWire && r.baseWire ? `<span style="color:var(--muted);font-weight:400">(${fmtBytes(r.thisWire)} vs ${fmtBytes(r.baseWire)})</span>` : ''}</td>
            <td class="savings ${latCls}">${r.dLatency >= 0 ? '+' : ''}${r.dLatency} ms</td>
          </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    <div class="note">${noteForScreen()}</div>
  `;
  $('summaryBody').innerHTML = html;
  $('summary').style.display = '';
}

function noteForScreen() {
  const s = activeScreen();
  if (s.id === 'trip') return 'JSON pass-through equals NSW direct in body size by design — the BFF forwards verbatim. Proto reshapes to a smaller binary.';
  if (s.id === 'departures') return 'JSON pass-through is byte-equal to NSW. Proto is screen-shaped (only line + destination + time + platform), so it carries far less.';
  if (s.id === 'parking') return 'No NSW direct comparison — the BFF fan-out makes N upstream calls per request. Proto vs JSON shows the encoding-only delta for the same logical batch.';
  if (s.id === 'tracking') return 'GTFS-RT is byte-for-byte pass-through. No delta is expected; this check confirms the BFF isn\'t silently reshaping.';
  return '';
}

// ---------------------------------------------------------------------------
// Debug-any-URL panel.
// ---------------------------------------------------------------------------
async function runDebug() {
  const raw = $('debugInput').value.trim();
  if (!raw) return;
  $('debugRun').disabled = true; $('debugRun').textContent = 'Firing…';
  $('debugResult').innerHTML = '';

  const base = ($('baseUrl').value || 'http://localhost:8080').replace(/\/+$/, '');
  // Parse: either URL or curl. Curl handling kept minimal.
  let url = raw;
  let method = 'GET';
  if (/^curl\s/i.test(raw)) {
    const m = raw.match(/'((https?|http):\/\/[^']+)'|"((https?|http):\/\/[^"]+)"|((https?|http):\/\/\S+)/);
    if (m) url = m[1] || m[3] || m[5];
  }
  // Auto-wrap NSW URLs.
  if (url.startsWith('https://api.transport.nsw.gov.au')) {
    url = `${base}/internal/passthrough?url=${encodeURIComponent(url)}`;
  }

  const r = await rawFetch(url, { binary: false });
  if (r.error) {
    $('debugResult').innerHTML = `<div class="card err" style="margin-top:12px;"><div class="ribbon">DEBUG</div><h3>Network error</h3><pre>${esc(r.error)}</pre></div>`;
  } else {
    const okCls = r.status >= 200 && r.status < 400 ? 'ok' : 'err';
    const statusPill = okCls === 'ok' ? 'pill-ok' : 'pill-err';
    const wire = r.encodedBodySize != null ? fmtBytes(r.encodedBodySize) : '—';
    $('debugResult').innerHTML = `
      <div class="card" style="margin-top:12px;">
        <div class="ribbon"><span class="badge">DEBUG</span><span class="${statusPill}">${r.status}</span></div>
        <div class="url">${esc(url)}</div>
        <div class="stat-grid">
          <div class="stat ${okCls}"><div class="label">Status</div><div class="value">${r.status}</div></div>
          <div class="stat"><div class="label">Latency</div><div class="value">${r.elapsed}<span style="font-size:11px;color:var(--muted)"> ms</span></div></div>
          <div class="stat"><div class="label">Body</div><div class="value">${fmtBytes(r.decodedBytes)}</div></div>
          <div class="stat"><div class="label">Wire</div><div class="value">${wire}</div></div>
        </div>
        <details class="body-detail" open><summary>Body</summary><pre>${esc(r.body)}</pre></details>
      </div>
    `;
  }
  $('debugRun').disabled = false; $('debugRun').textContent = 'Fire';
}

// ---------------------------------------------------------------------------
// Utils
// ---------------------------------------------------------------------------
function pct(base, current) {
  if (!base || base === 0) return null;
  return Math.round((current / base - 1) * 100);
}
function fmtSavings(p) {
  if (p === null || p === undefined) return '—';
  if (p === 0) return '0%';
  return p > 0 ? `+${p}%` : `${p}%`;
}
function fmtBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return `${b} B`;
  if (b < 1024 * 1024) return `${(b / 1024).toFixed(1)} KB`;
  return `${(b / 1024 / 1024).toFixed(1)} MB`;
}
function hexPreview(bytes, max = 256) {
  const slice = bytes.slice(0, max);
  const rows = [];
  for (let i = 0; i < slice.length; i += 16) {
    const chunk = slice.slice(i, i + 16);
    const hex = Array.from(chunk).map(b => b.toString(16).padStart(2, '0')).join(' ');
    rows.push(hex);
  }
  return rows.join('\n') + (bytes.length > max ? `\n... (${bytes.length - max} more bytes)` : '');
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

// ---------------------------------------------------------------------------
// Wire up + first render.
// ---------------------------------------------------------------------------
function renderAll() {
  renderScreens();
  renderInputs();
  renderResultsSkeleton();
}

$('runAll').addEventListener('click', () => runAll());
$('debugRun').addEventListener('click', () => runDebug());
$('baseUrl').addEventListener('input', () => ss.setItem('baseUrl', $('baseUrl').value));
$('version').addEventListener('input', () => ss.setItem('version', $('version').value));

// Restore persisted base / version.
if (ss.getItem('baseUrl')) $('baseUrl').value = ss.getItem('baseUrl');
if (ss.getItem('version')) $('version').value = ss.getItem('version');

renderAll();
</script>
