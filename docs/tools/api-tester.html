<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KRAIL BFF — Dashboard</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #1c2128;
    --panel-elev: #22272e;
    --border: #373e47;
    --fg: #cdd9e5;
    --muted: #768390;
    --accent: #4493f8;
    --accent-soft: #1f6feb40;
    --ok: #3fb950;
    --warn: #d29922;
    --err: #f85149;
    --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  a { color: var(--accent); }
  code, pre { font-family: var(--mono); }

  /* ------------------ TOP BAR ------------------ */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .tag { color: var(--muted); font-size: 12px; }
  header .config-inline { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
  header .config-inline label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  header .config-inline input {
    padding: 5px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--fg); font-family: var(--mono); font-size: 12px;
    min-width: 200px;
  }
  header .config-inline input:focus { outline: none; border-color: var(--accent); }
  header .config-inline button {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  header .config-inline button:hover { border-color: var(--accent); color: var(--accent); }

  /* ------------------ LAYOUT ------------------ */
  .shell { display: flex; flex: 1; min-height: 0; }
  .nav {
    width: 280px; flex: 0 0 280px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .nav .section-title {
    padding: 8px 16px;
    color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .nav .item {
    display: flex; flex-direction: column; gap: 4px;
    padding: 10px 16px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.05s;
  }
  .nav .item:hover { background: var(--panel-elev); }
  .nav .item.active { background: var(--panel); border-left-color: var(--accent); }
  .nav .item .row1 { display: flex; align-items: baseline; gap: 8px; }
  .nav .item .method {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    padding: 1px 5px; border-radius: 2px; background: var(--accent-soft); color: var(--accent);
  }
  .nav .item .path { font-family: var(--mono); font-size: 12px; color: var(--fg); flex: 1; word-break: break-all; }
  .nav .item .name { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .nav .item .sparkline { display: block; height: 12px; margin-top: 4px; }
  .nav .add-custom {
    margin: 8px 16px;
    padding: 8px 12px;
    background: transparent; border: 1px dashed var(--border); color: var(--muted);
    border-radius: 4px; cursor: pointer; font-size: 12px;
    width: calc(100% - 32px);
    font-family: var(--mono);
    text-align: left;
  }
  .nav .add-custom:hover { border-color: var(--accent); color: var(--accent); }

  .detail { flex: 1; min-width: 0; overflow-y: auto; padding: 20px 24px; }

  .history {
    width: 320px; flex: 0 0 320px;
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .history h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); padding: 8px 16px; margin: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .history h2 button {
    background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 11px;
  }
  .history h2 button:hover { color: var(--accent); }
  .history .filter {
    margin: 0 16px 8px;
    width: calc(100% - 32px);
    padding: 5px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--fg); font-family: var(--mono); font-size: 11px;
  }
  .history .filter:focus { outline: none; border-color: var(--accent); }
  .history-row {
    display: flex; flex-direction: column; gap: 2px;
    padding: 8px 16px; cursor: pointer; border-left: 2px solid transparent;
  }
  .history-row:hover { background: var(--panel-elev); }
  .history-row .row1 { display: flex; align-items: baseline; gap: 8px; font-family: var(--mono); font-size: 11px; }
  .history-row .row1 .status-pill {
    padding: 1px 6px; border-radius: 2px; font-weight: 600; font-size: 10px;
  }
  .history-row .status-pill.ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
  .history-row .status-pill.warn { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
  .history-row .status-pill.err { background: rgba(248, 81, 73, 0.15); color: var(--err); }
  .history-row .row1 .ms { color: var(--muted); }
  .history-row .row2 { font-family: var(--mono); font-size: 11px; color: var(--muted); word-break: break-all; }
  .history-row .row3 { font-size: 10px; color: var(--muted); }
  .history-empty { padding: 16px; color: var(--muted); font-size: 12px; font-style: italic; }

  /* ------------------ DETAIL PANE ------------------ */
  .endpoint-head-pane { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px; }
  .endpoint-head-pane h1 { font-size: 18px; margin: 0 0 4px; }
  .endpoint-head-pane .meta { color: var(--muted); font-size: 13px; }
  .endpoint-head-pane .meta code { color: var(--fg); }

  .params { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 12px; }
  .params label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .params input {
    width: 100%; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--fg); font-family: var(--mono); font-size: 12px;
  }
  .params input:focus { outline: none; border-color: var(--accent); }
  .params textarea {
    width: 100%; min-height: 70px; padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--fg); font-family: var(--mono); font-size: 12px; resize: vertical;
  }
  .params textarea:focus { outline: none; border-color: var(--accent); }

  .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .actions button {
    background: var(--accent); color: white; border: 0; padding: 7px 14px;
    border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .actions button:hover { background: #3683e1; }
  .actions button:disabled { opacity: 0.5; cursor: wait; }
  .actions button.secondary { background: transparent; border: 1px solid var(--border); color: var(--fg); }
  .actions button.secondary:hover { border-color: var(--accent); background: var(--accent-soft); }
  .actions input[type=number] {
    width: 70px; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--fg); font-family: var(--mono); font-size: 12px;
  }
  .actions .label { color: var(--muted); font-size: 12px; }

  /* ------------------ INSPECTOR ------------------ */
  .inspector-status {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--mono); font-size: 13px;
  }
  .inspector-status .badge { padding: 3px 10px; border-radius: 3px; font-weight: 600; font-size: 12px; }
  .inspector-status .badge.ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
  .inspector-status .badge.warn { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
  .inspector-status .badge.err { background: rgba(248, 81, 73, 0.15); color: var(--err); }
  .inspector-status .method-pill {
    background: var(--accent-soft); color: var(--accent); padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600;
  }
  .inspector-url { word-break: break-all; color: var(--fg); flex: 1 1 100%; padding: 8px 0 0; font-size: 12px; }
  .inspector-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .inspector-actions button {
    background: transparent; border: 1px solid var(--border); color: var(--fg);
    padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px;
    font-family: var(--mono);
  }
  .inspector-actions button:hover { border-color: var(--accent); color: var(--accent); }

  details { margin-top: 8px; }
  details summary {
    cursor: pointer; padding: 6px 10px; color: var(--muted); font-size: 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    user-select: none; list-style: none;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '▸ '; color: var(--muted); }
  details[open] summary::before { content: '▾ '; }
  details[open] summary { border-radius: 4px 4px 0 0; border-bottom: 0; }
  details summary:hover { color: var(--fg); }
  details > div, details > pre {
    border: 1px solid var(--border); border-top: 0; border-radius: 0 0 4px 4px;
    padding: 10px 12px; margin: 0; background: var(--bg);
    font-family: var(--mono); font-size: 12px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-all;
    max-height: 70vh; overflow: auto;
  }
  details > pre.full { max-height: 80vh; }
  details.full-body > pre { max-height: 80vh; }

  /* ------------------ NAV GROUPS ------------------ */
  .nav .group { margin-bottom: 6px; }
  .nav .group-title {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); cursor: pointer; user-select: none;
  }
  .nav .group-title:hover { color: var(--fg); }
  .nav .group-title .count { color: var(--muted); font-weight: 400; font-size: 10px; }
  .nav .group-title .caret { font-size: 9px; color: var(--muted); margin-right: 4px; transition: transform 0.1s; }
  .nav .group.collapsed .caret { transform: rotate(-90deg); }
  .nav .group.collapsed .group-body { display: none; }
  .nav .item .method.method-trace { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
  .nav .item .method.method-saved { background: rgba(210, 153, 34, 0.18); color: var(--warn); }
  .nav .item.postman .name { font-style: italic; }
  .nav .item.postman .path { font-size: 10px; opacity: 0.85; }

  /* ------------------ HIGHLIGHTS PANEL ------------------ */
  .highlights {
    background: linear-gradient(180deg, rgba(68, 147, 248, 0.08), rgba(68, 147, 248, 0.02));
    border: 1px solid var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 6px; padding: 10px 14px; margin: 8px 0;
  }
  .highlights .hl-title {
    color: var(--accent); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .highlights .hl-row {
    display: flex; align-items: baseline; gap: 8px; padding: 3px 0;
    font-size: 12px; flex-wrap: wrap;
  }
  .highlights .hl-row .hl-key { color: var(--muted); min-width: 110px; font-size: 11px; }
  .highlights .hl-row .hl-val { color: var(--fg); font-family: var(--mono); flex: 1; word-break: break-all; }
  .highlights .hl-row .hl-val strong { color: var(--accent); }
  .highlights .hl-copy {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 1px 6px; border-radius: 3px; font-size: 10px; cursor: pointer; font-family: var(--mono);
  }
  .highlights .hl-copy:hover { border-color: var(--accent); color: var(--accent); }
  .highlights .hl-copy.copied { color: var(--ok); border-color: var(--ok); }

  /* JSON tree (collapsible) */
  .json-tree { font-family: var(--mono); font-size: 12px; line-height: 1.55; }
  .json-tree .jt-row { display: flex; align-items: baseline; gap: 4px; }
  .json-tree .jt-toggle {
    cursor: pointer; user-select: none; color: var(--muted);
    width: 12px; display: inline-block; text-align: center;
  }
  .json-tree .jt-toggle:hover { color: var(--accent); }
  .json-tree .jt-key { color: #79c0ff; }
  .json-tree .jt-string { color: #a5d6ff; }
  .json-tree .jt-number { color: #ff7b72; }
  .json-tree .jt-bool, .json-tree .jt-null { color: #d2a8ff; }
  .json-tree .jt-summary { color: var(--muted); font-style: italic; }
  .json-tree .jt-children { padding-left: 18px; border-left: 1px dashed var(--border); margin-left: 4px; }
  .json-tree .jt-collapsed .jt-children { display: none; }
  .diag-list { padding: 0; margin: 0; list-style: none; }
  .diag-list li { padding: 6px 0; color: var(--fg); font-size: 12px; border-bottom: 1px solid var(--border); }
  .diag-list li:last-child { border-bottom: 0; }
  .diag-list code { background: var(--panel-elev); padding: 1px 4px; border-radius: 2px; font-size: 11px; }
  .diag-fix { color: var(--accent); }

  .stats { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-top: 8px; font-family: var(--mono); font-size: 12px; }
  .stats .row { display: flex; gap: 14px; padding: 2px 0; flex-wrap: wrap; }
  .stats .label { color: var(--muted); min-width: 130px; }
  .stats .value strong { color: var(--accent); }

  .empty-state {
    color: var(--muted); font-size: 13px; padding: 40px 0; text-align: center;
  }

  /* ------------------ CUSTOM DEBUG ------------------ */
  .custom-tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .custom-tabs button {
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    padding: 8px 14px; font-size: 13px; border-bottom: 2px solid transparent;
  }
  .custom-tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }

  /* ------------------ TRACE TIMELINE ------------------ */
  .trace-table { margin-top: 8px; }
  .trace-row {
    display: grid; grid-template-columns: 280px 1fr; gap: 12px; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .trace-row:last-child { border-bottom: 0; }
  .trace-meta { display: flex; flex-direction: column; gap: 2px; }
  .trace-meta .status-pill {
    display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: 10px;
    font-weight: 600; font-family: var(--mono); width: fit-content;
  }
  .trace-meta .status-pill.ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
  .trace-meta .status-pill.warn { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
  .trace-meta .status-pill.err { background: rgba(248, 81, 73, 0.15); color: var(--err); }
  .trace-meta .trace-label { font-size: 12px; color: var(--fg); margin-top: 2px; }
  .trace-meta .trace-detail { font-size: 10px; color: var(--muted); font-family: var(--mono); }
  .trace-timeline {
    position: relative; height: 22px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 3px;
  }
  .trace-bar {
    position: absolute; top: 0; bottom: 0;
    background: var(--accent); border-radius: 2px;
    display: flex; align-items: center; justify-content: flex-start;
    padding: 0 6px; min-width: 6px;
  }
  .trace-bar.ok { background: var(--ok); }
  .trace-bar.warn { background: var(--warn); }
  .trace-bar.err { background: var(--err); }
  .trace-bar-label {
    color: white; font-size: 10px; font-family: var(--mono); font-weight: 600;
    white-space: nowrap; text-shadow: 0 0 2px rgba(0,0,0,0.5);
  }

  /* ------------------ COMPARISON ------------------ */
  .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .cmp-cell {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; font-family: var(--mono); font-size: 12px;
  }
  .cmp-cell.err { border-color: var(--err); }
  .cmp-head { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .cmp-status { font-weight: 600; padding: 3px 8px; border-radius: 2px; display: inline-block; margin-bottom: 8px; }
  .cmp-status.ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
  .cmp-status.err { background: rgba(248, 81, 73, 0.15); color: var(--err); }
  .cmp-metric { display: flex; gap: 12px; color: var(--muted); margin-bottom: 6px; }
  .cmp-metric span strong { color: var(--fg); }
  .cmp-cell pre { background: var(--panel-elev); border: 1px solid var(--border); border-radius: 3px; padding: 6px; max-height: 60vh; overflow: auto; margin: 0; font-size: 11px; }

  @media (max-width: 1300px) {
    .cmp-grid { grid-template-columns: 1fr; }
  }

  /* ------------------ RESPONSIVE ------------------ */
  @media (max-width: 1100px) {
    .history { display: none; }
  }
  @media (max-width: 800px) {
    .nav { width: 200px; flex-basis: 200px; }
  }
</style>
</head>
<body>

<header>
  <h1>KRAIL BFF</h1>
  <span class="tag">Dashboard</span>
  <div class="config-inline">
    <label>Base URL: <input id="baseUrl" placeholder="http://localhost:8080"></label>
    <label>Authorization: <input id="auth" type="password" placeholder="apikey ..."></label>
    <label>X-Krail-Version: <input id="version" placeholder="1.5.0"></label>
    <button id="clearSession" type="button" title="Clear all sessionStorage values">Clear session</button>
  </div>
</header>

<div class="shell">
  <nav class="nav" id="nav"></nav>

  <main class="detail" id="detail">
    <div class="empty-state">Pick an endpoint from the left.</div>
  </main>

  <aside class="history">
    <h2>
      Request history
      <button id="clearHistory" type="button" title="Clear history">clear</button>
    </h2>
    <input class="filter" id="historyFilter" placeholder="filter by URL or status…">
    <div id="historyList"><div class="history-empty">No requests yet this session.</div></div>
  </aside>
</div>

<script>
  // ============================================================
  // Endpoint catalogue. Stable order; matches the server.
  // ============================================================
  const endpoints = [
    { id: 'health',              method: 'GET', path: '/health',
      name: 'Health probe', group: 'admin',
      params: [] },
    { id: 'ready',               method: 'GET', path: '/ready',
      name: 'Readiness probe (NSW upstream)', group: 'admin',
      params: [] },
    { id: 'tripPlanJson',        method: 'GET', path: '/api/v1/trip/plan',
      name: 'Trip planner — JSON', group: 'trips',
      params: [
        { name: 'origin', default: '200060' },
        { name: 'destination', default: '10101100' },
        { name: 'depArr', default: 'dep' },
        { name: 'date',   placeholder: 'YYYYMMDD (optional)' },
        { name: 'time',   placeholder: 'HHmm (optional)' },
        { name: 'excludedModes', placeholder: 'comma-separated' },
      ],
      nswCompare: ({ q }) => `https://api.transport.nsw.gov.au/v1/tp/trip?name_origin=${q.origin}&name_destination=${q.destination}&depArrMacro=${q.depArr || 'dep'}&type_destination=any&calcNumberOfTrips=6&type_origin=any&TfNSWTR=true&version=10.2.1.42&coordOutputFormat=EPSG:4326&itOptionsActive=1&computeMonomodalTripBicycle=false&cycleSpeed=16&useElevationData=1&outputFormat=rapidJSON`,
    },
    { id: 'tripPlanProto',       method: 'GET', path: '/api/v1/trip/plan-proto',
      name: 'Trip planner — protobuf', group: 'trips',
      binary: true,
      params: [
        { name: 'origin', default: '200060' },
        { name: 'destination', default: '10101100' },
        { name: 'depArr', default: 'dep' },
      ] },
    { id: 'tripLegacy',          method: 'GET', path: '/v1/tp/trip',
      name: 'Trip planner — legacy NSW shape', group: 'trips',
      params: [
        { name: 'origin', default: '200060' },
        { name: 'destination', default: '10101100' },
      ],
      nswCompare: ({ q }) => `https://api.transport.nsw.gov.au/v1/tp/trip?name_origin=${q.origin}&name_destination=${q.destination}&depArrMacro=dep&type_destination=any&calcNumberOfTrips=6&type_origin=any&TfNSWTR=true&version=10.2.1.42&coordOutputFormat=EPSG:4326&outputFormat=rapidJSON`,
    },
    { id: 'departures',          method: 'GET', path: '/v1/stops/{stopId}/departures',
      name: 'Departures for a stop', group: 'home',
      pathParams: [{ name: 'stopId', default: '200060' }],
      params: [
        { name: 'date', placeholder: 'YYYYMMDD' },
        { name: 'time', placeholder: 'HHmm' },
      ],
      nswCompare: ({ p, q }) => `https://api.transport.nsw.gov.au/v1/tp/departure_mon?name_dm=${p.stopId}&type_dm=any&mode=direct&excludedMeans=checkbox&limit=20${q.date ? `&itdDate=${q.date}` : ''}${q.time ? `&itdTime=${q.time}` : ''}&outputFormat=rapidJSON&coordOutputFormat=EPSG:4326&TfNSWDM=true&version=10.2.1.42`,
    },
    { id: 'parkingList',         method: 'GET', path: '/v1/parking/facilities',
      name: 'Park & Ride — facility list', group: 'home',
      params: [],
      nswCompare: () => `https://api.transport.nsw.gov.au/v1/carpark`,
    },
    { id: 'parkingAvail',        method: 'GET', path: '/v1/parking/facilities/{facilityId}/availability',
      name: 'Park & Ride — availability', group: 'home',
      pathParams: [{ name: 'facilityId', default: '1' }],
      params: [],

  // Slot a URL into a group based on path patterns. Used for Postman saved entries.
  function categoriseUrl(url) {

  // ============================================================

  const postmanRequests = [

    {"collection":"NSW Trip Planning","name":"Ferry Train","method":"GET","url":"https://api.transport.nsw.gov.au/v1/tp/trip?outputFormat=rapidJSON&coordOutputFormat=EPSG%3A4326&depArrMacro=dep&type_origin=any&name_origin=10102027&type_destination=any&name_destination=10101324&calcNumberOfTrips=6&TfNSWTR=true&version=10.2.1.42&itOptionsActive=1&computeMonomodalTripBicycle=false&cycleSpeed=16&useElevationData=1"},
    {"collection":"NSW Trip Planning","name":"Central - TownHall","method":"GET","url":"https://api.transport.nsw.gov.au/v1/tp/trip?outputFormat=rapidJSON&coordOutputFormat=EPSG%3A4326&depArrMacro=dep&type_origin=any&name_origin=200060&type_destination=any&name_destination=10101101&calcNumberOfTrips=6&TfNSWTR=true&version=10.2.1.42&itOptionsActive=1&computeMonomodalTripBicycle=false&cycleSpeed=16&useElevationData=1"},
    {"collection":"Open Data NSW","name":"sydneytrains · vehiclepos","method":"GET","url":"https://api.transport.nsw.gov.au/v2/gtfs/vehiclepos/sydneytrains"},
  ].map((r, i) => ({ ...r, id: `postman:${i}`, group: categoriseUrl(r.url) || 'other' }));

  // ============================================================
  // User journeys ("traces") — what the mobile app actually calls.
  // Each step references an endpoint id; params override defaults.
  // ============================================================
  const journeys = [
    {

      steps: [
        { endpoint: 'stopsManifest', params: {}, label: 'Stops manifest (304/redirect)' },
        { endpoint: 'departures', params: { stopId: '200060' }, label: 'Departures · Town Hall' },
      ],
    },
    {

      desc: 'List facilities, then drill into one for availability.',

    },

      steps: [
        { endpoint: 'tripPlanJson', params: { origin: '200070', destination: '200060' }, label: 'Static plan' },
        { endpoint: 'gtfsRtV2', params: { feed: 'sydneytrains' }, label: 'Trip updates v2' },
        { endpoint: 'gtfsVehiclepos', params: { feed: 'sydneytrains' }, label: 'Vehicle positions' },
      ],
    },
    {
      id: 'cold-start',
      name: 'Cold start — manifests + first trip',
      desc: 'What happens on the very first launch: dataset manifest checks before any feature loads.',
      steps: [
        { endpoint: 'stopsManifest', params: {}, label: 'Stops manifest' },
        { endpoint: 'routesManifest', params: {}, label: 'Routes manifest' },
        { endpoint: 'health', params: {}, label: 'Health probe' },
      ],
    },
  ];
  const journeyById = Object.fromEntries(journeys.map(j => [j.id, j]));

  // ============================================================
  // sessionStorage (cleared on tab close)
  // ============================================================
  const SS = window.sessionStorage;
  const SSP = 'krail-bff-tester:';
  const ssGet = (k, fb='') => SS.getItem(SSP + k) ?? fb;
  const ssSet = (k, v)    => v ? SS.setItem(SSP + k, v) : SS.removeItem(SSP + k);
  const ssGetJSON = (k, fb) => { try { return JSON.parse(ssGet(k)); } catch { return fb; } };
  const ssSetJSON = (k, v)  => SS.setItem(SSP + k, JSON.stringify(v));
  const ssClearAll = () => Object.keys(SS).filter(k => k.startsWith(SSP)).forEach(k => SS.removeItem(k));

  // ============================================================
  // State
  // ============================================================
  const state = {
    activeId: ssGet('activeId') || null,   // endpoint id, or 'custom-debug'
    history: ssGetJSON('history', []),     // {id, time, method, url, status, elapsed, decodedBytes, encodedBodySize}
    latencies: ssGetJSON('latencies', {}), // endpointId -> [ms, ms, ...]
    historyFilter: '',
  };
  const MAX_HISTORY = 100;
  const MAX_SPARK_POINTS = 12;

  // ============================================================
  // Config bar wiring
  // ============================================================
  const baseUrlEl = document.getElementById('baseUrl');
  const authEl = document.getElementById('auth');
  const versionEl = document.getElementById('version');
  baseUrlEl.value = ssGet('baseUrl', 'http://localhost:8080');
  authEl.value = ssGet('auth');
  versionEl.value = ssGet('version');
  baseUrlEl.addEventListener('input', () => ssSet('baseUrl', baseUrlEl.value.trim()));
  authEl.addEventListener('input',    () => ssSet('auth',    authEl.value));
  versionEl.addEventListener('input', () => ssSet('version', versionEl.value.trim()));

  document.getElementById('clearSession').addEventListener('click', () => {
    if (!confirm('Clear all sessionStorage values (config + form values + history)?')) return;
    ssClearAll();
    location.reload();
  });
  document.getElementById('clearHistory').addEventListener('click', () => {
    state.history = []; ssSetJSON('history', []);
    state.latencies = {}; ssSetJSON('latencies', {});
    renderHistory(); renderNav();
  });
  document.getElementById('historyFilter').addEventListener('input', (ev) => {
    state.historyFilter = ev.target.value.toLowerCase();
    renderHistory();
  });

  // ============================================================
  // Nav (left sidebar)
  // ============================================================
  // Per-group collapsed state — persists in sessionStorage so reloads keep your view.
  function isGroupCollapsed(gid) { return ssGet(`navGroup:${gid}`) === '1'; }
  function setGroupCollapsed(gid, v) { ssSet(`navGroup:${gid}`, v ? '1' : '0'); }

  function renderNav() {
    const root = document.getElementById('nav');
    const customActive = state.activeId === 'custom-debug';

    // 1. Bucket endpoints + Postman entries + journeys by group.
    const endpointsByGroup = {};
    for (const e of endpoints) {
      const g = e.group || 'admin';
      (endpointsByGroup[g] ||= []).push(e);
    }
    const postmanByGroup = {};
    for (const r of postmanRequests) {
      const g = r.group || 'other';
      (postmanByGroup[g] ||= []).push(r);
    }
    // Journeys all sit in a dedicated section above the screen groups.
    root.innerHTML = `
      <div class="section-title">Debug</div>
      <button class="add-custom${customActive ? ' active' : ''}" type="button" id="navCustom">+ Debug any URL / curl</button>

      <div id="navJourneysGroup"></div>
      <div id="navGroups"></div>
      <div id="navOther"></div>
    `;
    document.getElementById('navCustom').addEventListener('click', () => activate('custom-debug'));

    // 2. Journeys group (mobile-call traces).
    if (journeys.length) {
      const jWrap = document.getElementById('navJourneysGroup');
      jWrap.appendChild(renderGroup({
        id: 'journeys',
        title: 'Mobile call traces',
        children: journeys.map(j => {
          const id = `trace:${j.id}`;
          return navItem({
            active: state.activeId === id,
            method: 'TRACE', methodClass: 'method-trace',
            path: j.name, name: `${j.steps.length} step${j.steps.length === 1 ? '' : 's'}`,
            onClick: () => activate(id),
          });
        }),
      }));
    }

    // 3. Five canonical KRAIL-screen groups.
    const groupsRoot = document.getElementById('navGroups');
    for (const g of GROUPS) {
      const eps = endpointsByGroup[g.id] || [];
      const saved = postmanByGroup[g.id] || [];
      if (!eps.length && !saved.length) continue;

      const children = [];
      for (const e of eps) {
        const points = state.latencies[e.id] || [];
        children.push(navItem({
          active: state.activeId === e.id,
          method: e.method, path: e.path, name: e.name,
          sparkline: sparklineSVG(points, 60, 12),
          onClick: () => activate(e.id),
        }));
      }
      for (const r of saved) {
        children.push(navItem({
          active: state.activeId === r.id,
          method: 'SAVED', methodClass: 'method-saved',
          path: r.name, name: shortPathFor(r.url),
          extraClass: 'postman',
          onClick: () => activate(r.id),
        }));
      }
      groupsRoot.appendChild(renderGroup({ id: g.id, title: g.title, children }));
    }

    // 4. "Other" — Postman URLs we couldn't classify (rare).
    const others = postmanByGroup.other || [];
    if (others.length) {
      const oRoot = document.getElementById('navOther');
      oRoot.appendChild(renderGroup({
        id: 'other',
        title: 'Other saved requests',
        children: others.map(r => navItem({
          active: state.activeId === r.id,
          method: 'SAVED', methodClass: 'method-saved',
          path: r.name, name: shortPathFor(r.url),
          extraClass: 'postman',
          onClick: () => activate(r.id),
        })),
      }));
    }
  }

  function renderGroup({ id, title, children }) {
    const wrap = document.createElement('div');
    wrap.className = 'group' + (isGroupCollapsed(id) ? ' collapsed' : '');
    const header = document.createElement('div');
    header.className = 'group-title';
    header.innerHTML = `
      <span><span class="caret">▼</span>${esc(title)}</span>
      <span class="count">${children.length}</span>
    `;
    header.addEventListener('click', () => {
      const collapsed = wrap.classList.toggle('collapsed');
      setGroupCollapsed(id, collapsed);
    });
    wrap.appendChild(header);
    const body = document.createElement('div');
    body.className = 'group-body';
    for (const c of children) body.appendChild(c);
    wrap.appendChild(body);
    return wrap;
  }

  function navItem({ active, method, methodClass, path, name, sparkline, onClick, extraClass }) {
    const item = document.createElement('div');
    item.className = 'item' + (active ? ' active' : '') + (extraClass ? ' ' + extraClass : '');
    item.innerHTML = `
      <div class="row1"><span class="method ${methodClass || ''}">${esc(method)}</span><span class="path">${esc(path)}</span></div>
      <div class="name">${esc(name || '')}</div>
      ${sparkline ? `<svg class="sparkline" viewBox="0 0 60 12" preserveAspectRatio="none">${sparkline}</svg>` : ''}
    `;
    item.addEventListener('click', onClick);
    return item;
  }

  // Drop the host + collapse the path; nav has limited width.
  function shortPathFor(url) {
    try {
      const u = new URL(url);
      let p = u.pathname;
      if (p.length > 38) p = p.slice(0, 18) + '…' + p.slice(-18);
      return p + (u.search ? '?…' : '');
    } catch { return url.length > 50 ? url.slice(0, 50) + '…' : url; }
  }

  function sparklineSVG(points, w, h) {
    if (!points.length) return `<line x1="0" y1="${h - 1}" x2="${w}" y2="${h - 1}" stroke="#373e47" stroke-width="1"/>`;
    const max = Math.max(...points, 1);
    const step = w / Math.max(points.length - 1, 1);
    const path = points.map((p, i) => `${i ? 'L' : 'M'}${(i * step).toFixed(2)},${(h - (p / max) * (h - 2)).toFixed(2)}`).join(' ');
    return `<path d="${path}" fill="none" stroke="#4493f8" stroke-width="1.2"/>`;
  }

  // ============================================================
  // Detail pane (centre)
  // ============================================================
  function activate(id) {
    state.activeId = id;
    ssSet('activeId', id);
    renderNav();
    renderDetail();
  }

  // Lookup helpers for the new sources.
  const postmanById = Object.fromEntries(postmanRequests.map(r => [r.id, r]));

  function renderDetail() {
    const root = document.getElementById('detail');
    if (state.activeId === 'custom-debug') return renderCustomDebug(root);
    if (state.activeId && state.activeId.startsWith('trace:')) {
      const journeyId = state.activeId.slice('trace:'.length);
      return renderTrace(root, journeyById[journeyId]);
    }
    if (state.activeId && state.activeId.startsWith('postman:')) {
      return renderPostmanDetail(root, postmanById[state.activeId]);
    }
    const e = endpointById[state.activeId];
    if (!e) {
      root.innerHTML = `<div class="empty-state">Pick an endpoint from the left, or use <strong>+ Debug any URL</strong>.</div>`;
      return;
    }
    const allParams = [...(e.pathParams || []), ...(e.params || [])];
    root.innerHTML = `
      <div class="endpoint-head-pane">
        <h1>${e.name}</h1>
        <div class="meta"><span style="background: var(--accent-soft); color: var(--accent); padding: 2px 8px; border-radius: 3px; font-family: var(--mono); font-size: 11px;">${e.method}</span> <code>${e.path}</code></div>
      </div>
      ${allParams.length ? '<div class="params" id="params"></div>' : ''}
      <div class="actions">
        <button class="send" type="button">Send</button>
        <span class="label">or run</span>
        <input type="number" class="runs" min="2" max="100" value="10">
        <button class="run-multi secondary" type="button">× times</button>
        ${e.nswCompare ? '<button class="compare secondary" type="button" title="Fire BFF and NSW direct in parallel, show side-by-side metrics">Compare with NSW</button>' : ''}
        <span class="label" style="margin-left: auto;">${e.binary ? 'binary response' : ''}</span>
      </div>
      <div class="response" id="response"></div>
    `;
    if (allParams.length) {
      const grid = document.getElementById('params');
      for (const p of allParams) {
        const isPath = (e.pathParams || []).some(pp => pp.name === p.name);
        const id = `${e.id}-${p.name}`;
        const w2 = document.createElement('div');
        w2.innerHTML = `
          <label for="${id}">${p.name}${isPath ? ' (path)' : ''}</label>
          <input id="${id}" data-name="${p.name}" placeholder="${p.placeholder || ''}">
        `;
        const input = w2.querySelector('input');
        const stored = ssGet(`p:${e.id}:${p.name}`);
        input.value = stored || (p.default || '');
        input.addEventListener('input', () => ssSet(`p:${e.id}:${p.name}`, input.value));
        grid.appendChild(w2);
      }
    }

    root.querySelector('.send').addEventListener('click', () => sendActive(e, 1));
    root.querySelector('.run-multi').addEventListener('click', () => {
      const n = Math.max(2, Math.min(100, parseInt(root.querySelector('.runs').value) || 10));
      sendActive(e, n);
    });
    const cmpBtn = root.querySelector('.compare');
    if (cmpBtn) cmpBtn.addEventListener('click', () => runCompare(e));
  }

  // ============================================================
  // Postman entry — rendered like a custom debug, but pre-filled.
  // NSW URLs are routed through /internal/passthrough so the browser
  // doesn't choke on NSW's missing CORS headers; the BFF adds the
  // server-side API key.

  function renderPostmanDetail(root, r) {
    if (!r) {
      root.innerHTML = `<div class="empty-state">Saved request not found.</div>`;

        <div class="meta">
          <span style="background: rgba(210, 153, 34, 0.18); color: var(--warn); padding: 2px 8px; border-radius: 3px; font-family: var(--mono); font-size: 11px;">SAVED · ${esc(r.collection)}</span>
          <span style="background: var(--accent-soft); color: var(--accent); padding: 2px 8px; border-radius: 3px; font-family: var(--mono); font-size: 11px; margin-left: 6px;">${esc(r.method)}</span>
        </div>
      </div>
      <div style="margin-bottom: 12px;">
        <label style="color: var(--muted); font-size: 12px; display: block; margin-bottom: 4px;">URL</label>
        <textarea id="pmUrl" style="width: 100%; min-height: 70px; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--fg); font-family: var(--mono); font-size: 12px; resize: vertical;">${esc(r.url)}</textarea>
      </div>
      <p style="color: var(--muted); font-size: 12px; margin: -6px 0 12px;">
        ${isNsw
          ? `ⓘ NSW URL — the dashboard fires this through the BFF's <code>/internal/passthrough</code> so your browser doesn't get blocked by CORS. The BFF adds the API key server-side; the <strong>Authorization</strong> field at the top of the page is ignored for NSW URLs.`
          : `ⓘ Sent directly with the top-bar <strong>Authorization</strong> header (if set).`}
      </p>
      <div class="actions">
        <button class="send" type="button">Send</button>
        <button class="copy-curl secondary" type="button">Copy as curl (NSW direct)</button>
        <span class="label" style="margin-left: auto;">${isNsw ? 'via /internal/passthrough' : 'direct'}</span>
      </div>
      <div class="response" id="response"></div>
    `;
    root.querySelector('.send').addEventListener('click', () => sendPostman(r));
    root.querySelector('.copy-curl').addEventListener('click', () => {
      const url = document.getElementById('pmUrl').value.trim();
      const curl = `curl -i -X ${r.method} '${url.replace(/'/g, `'\\''`)}' \\\n  -H 'Authorization: apikey YOUR_NSW_API_KEY'`;
      navigator.clipboard.writeText(curl).then(
        () => { const btn = root.querySelector('.copy-curl'); const orig = btn.textContent; btn.textContent = 'copied!'; setTimeout(() => btn.textContent = orig, 1200); },
        () => {},
      );
    });

  async function sendPostman(saved) {
    const respEl = document.getElementById('response');
    const sendBtn = document.querySelector('.detail .send');
    sendBtn.disabled = true; sendBtn.textContent = 'Sending…';
    const url = document.getElementById('pmUrl').value.trim();
    const isNsw = url.startsWith('https://api.transport.nsw.gov.au');
    const base = (baseUrlEl.value || 'http://localhost:8080').replace(/\/+$/, '');
    const fetchUrl = isNsw ? `${base}/internal/passthrough?url=${encodeURIComponent(url)}` : url;
    const headers = {};
    if (!isNsw) {
      const auth = authEl.value.trim(); if (auth) headers['Authorization'] = auth;
    }
    const req = {
      method: saved.method, url: fetchUrl, headers,
      hasAuth: !!headers['Authorization'],
      baseUrl: (() => { try { return new URL(fetchUrl).origin; } catch { return ''; } })(),
      // Annotate the inspector with the upstream URL when going via passthrough.
      noteLine: isNsw ? `via BFF /internal/passthrough → ${url}` : null,
    };
    try {
      const r = await rawFetch(fetchUrl, saved.method, headers);
      respEl.innerHTML = renderInspector(r, req);
      bindInspectorButtons(respEl, r, req);
      recordHistory(saved.id, req, r);
      renderHistory();
    } catch (err) {
      respEl.innerHTML = renderError(err, req);
      bindInspectorButtons(respEl, null, req);
      recordHistory(saved.id, req, null, err);
      renderHistory();
    } finally {
      sendBtn.disabled = false; sendBtn.textContent = 'Send';
    }
  }

  // ============================================================
  // Trace / journey view
  // ============================================================
  function renderTrace(root, j) {
    if (!j) { root.innerHTML = `<div class="empty-state">Trace not found.</div>`; return; }
    root.innerHTML = `
      <div class="endpoint-head-pane">
        <h1>${esc(j.name)}</h1>
        <div class="meta">${esc(j.desc)} · ${j.steps.length} step${j.steps.length === 1 ? '' : 's'}</div>
      </div>
      <div class="actions">
        <button class="run-trace" type="button">Run trace</button>
        <span class="label">fires the steps in order, ~150 ms apart, then renders a timeline</span>
      </div>
      <div class="response" id="traceOutput"></div>
    `;
    root.querySelector('.run-trace').addEventListener('click', () => runJourney(j));
  }

  async function runJourney(j) {
    const out = document.getElementById('traceOutput');
    const btn = document.querySelector('.run-trace');
    btn.disabled = true; btn.textContent = 'Running…';
    const results = [];
    const traceStart = performance.now();
    try {
      for (const step of j.steps) {
        const e = endpointById[step.endpoint];
        if (!e) { results.push({ step, error: 'unknown endpoint' }); continue; }
        const vals = { path: { ...(step.params || {}) }, query: { ...(step.params || {}) } };
        // Strip path params from query, and vice-versa, to avoid duplicate appearance.
        for (const pp of (e.pathParams || [])) delete vals.query[pp.name];
        for (const qp of (e.params || [])) delete vals.path[qp.name];
        // Fill in defaults for missing fields (so a step with sparse params still works).
        for (const pp of (e.pathParams || [])) if (vals.path[pp.name] === undefined && pp.default) vals.path[pp.name] = pp.default;
        const startedAt = performance.now() - traceStart;
        try {
          const r = await sendRequest(e, vals);
          results.push({ step, e, startedAt, r });
          recordHistory(e.id, buildRequestSnapshot(e, vals), r);
          recordLatency(e.id, r.elapsed);
        } catch (err) {
          results.push({ step, e, startedAt, error: err.message || String(err) });
        }
        await new Promise(r => setTimeout(r, 150));
      }
      out.innerHTML = renderTraceResults(j, results);
      renderHistory(); renderNav();
    } finally {
      btn.disabled = false; btn.textContent = 'Run trace';
    }
  }

  function renderTraceResults(j, results) {
    const totalMs = Math.max(...results.map(r => (r.startedAt || 0) + (r.r ? r.r.elapsed : 0)), 1);
    const totalBytes = results.reduce((s, r) => s + (r.r?.decodedBytes || 0), 0);
    const totalWire = results.reduce((s, r) => s + (r.r?.encodedBodySize || r.r?.decodedBytes || 0), 0);
    const okCount = results.filter(r => r.r && r.r.status >= 200 && r.r.status < 400).length;

    const rows = results.map((row, idx) => {
      const status = row.error ? 'ERROR' : `${row.r.status}`;
      const cls = row.error || row.r.status >= 400 ? 'err' : (row.r.status >= 300 ? 'warn' : 'ok');
      const elapsed = row.r ? row.r.elapsed : 0;
      const startPct = (row.startedAt / totalMs) * 100;
      const widthPct = Math.max((elapsed / totalMs) * 100, 1);
      const sizeStr = row.r ? fmtBytes(row.r.decodedBytes) : '—';
      return `
        <div class="trace-row">
          <div class="trace-meta">
            <span class="status-pill ${cls}">${status}</span>
            <span class="trace-label">${esc(row.step.label || row.e?.name || row.step.endpoint)}</span>
            <span class="trace-detail">${esc(row.e?.path || '')}</span>
          </div>
          <div class="trace-timeline">
            <div class="trace-bar ${cls}" style="left: ${startPct.toFixed(1)}%; width: ${widthPct.toFixed(1)}%;" title="${elapsed} ms">
              <span class="trace-bar-label">${elapsed} ms · ${sizeStr}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="stats">
        <div class="row"><span class="label">Total</span><span class="value"><strong>${Math.round(totalMs)}</strong> ms · <strong>${fmtBytes(totalBytes)}</strong> body${totalWire !== totalBytes ? ` · <strong>${fmtBytes(totalWire)}</strong> wire` : ''}</span></div>
        <div class="row"><span class="label">Steps</span><span class="value"><strong>${okCount}/${results.length}</strong> succeeded</span></div>
      </div>
      <div class="trace-table">${rows}</div>
      ${results.map((row, i) => {
        if (row.error) {
          return `<details><summary>#${i + 1} ${esc(row.step.endpoint)} — <span style="color: var(--err);">ERROR</span></summary><pre>${esc(row.error)}</pre></details>`;
        }
        const r = row.r;
        const cls = r.status >= 200 && r.status < 400 ? 'ok' : 'err';
        const head = `#${i + 1} ${esc(row.step.endpoint)} · <span class="status-pill ${cls}" style="display:inline-block; padding:1px 6px; border-radius:2px; font-size:10px; font-weight:600; font-family:var(--mono);">${r.status}</span> · ${r.elapsed} ms · ${fmtBytes(r.decodedBytes)}`;
        const hl = renderHighlightsBlock(extractHighlights(row.e, r));
        return `<details${i === 0 ? ' open' : ''} class="full-body">
          <summary>${head}</summary>
          <div>${hl}<pre style="border: 0; border-top: 1px solid var(--border); padding: 8px 0 0; margin-top: 8px; max-height: 60vh;">${esc(r.body)}</pre></div>
        </details>`;
      }).join('')}
    `;
  }

  // ============================================================
  // BFF vs NSW direct comparison
  // ============================================================
  async function runCompare(e) {
    const respEl = document.getElementById('response');
    const btn = document.querySelector('.compare');
    btn.disabled = true; btn.textContent = 'Comparing…';
    const vals = endpointParamValues(e);
    const bffReq = buildRequestSnapshot(e, vals);
    const nswUrl = e.nswCompare({ p: vals.path, q: vals.query });
    const passthroughUrl = `${(baseUrlEl.value || 'http://localhost:8080').replace(/\/+$/, '')}/internal/passthrough?url=${encodeURIComponent(nswUrl)}`;

    try {
      const [bff, nsw] = await Promise.allSettled([
        sendRequest(e, vals),
        rawFetch(passthroughUrl, 'GET', { 'X-Krail-Version': versionEl.value.trim() || undefined }, { binary: e.binary }),
      ]);
      respEl.innerHTML = renderCompare(e, bffReq, nswUrl, bff, nsw);
    } finally {
      btn.disabled = false; btn.textContent = 'Compare with NSW';
    }
  }

  function renderCompare(e, bffReq, nswUrl, bffRes, nswRes) {
    const cell = (res, label) => {
      if (res.status === 'rejected') return `<div class="cmp-cell err"><div class="cmp-head">${label}</div><div class="cmp-status err">NETWORK ERROR</div><pre>${esc(res.reason?.message || String(res.reason))}</pre></div>`;
      const r = res.value;
      const cls = r.status >= 200 && r.status < 300 ? 'ok' : 'err';
      const wireDelta = r.encodedBodySize != null && r.encodedBodySize > 0 ? ` (wire ${fmtBytes(r.encodedBodySize)})` : '';
      return `
        <div class="cmp-cell">
          <div class="cmp-head">${label}</div>
          <div class="cmp-status ${cls}">${r.status} ${esc(r.statusText)}</div>
          <div class="cmp-metric"><span>${r.elapsed} ms</span><span>${fmtBytes(r.decodedBytes)}${wireDelta}</span></div>
          <details><summary>Body (${fmtBytes(r.decodedBytes)})</summary><pre>${esc(r.body)}</pre></details>
        </div>
      `;
    };
    const summary = (() => {
      if (bffRes.status !== 'fulfilled' || nswRes.status !== 'fulfilled') return '';
      const b = bffRes.value, n = nswRes.value;
      if (b.status >= 400 || n.status >= 400) return '';
      const sizeWin = n.decodedBytes ? Math.round((1 - b.decodedBytes / n.decodedBytes) * 100) : 0;
      const speedDelta = b.elapsed - n.elapsed;
      return `
        <div class="stats">
          <div class="row"><span class="label">Body size</span><span class="value">BFF <strong>${fmtBytes(b.decodedBytes)}</strong> vs NSW <strong>${fmtBytes(n.decodedBytes)}</strong> → <strong style="color: ${sizeWin > 0 ? 'var(--ok)' : 'var(--warn)'};">BFF ${sizeWin > 0 ? '−' : '+'}${Math.abs(sizeWin)}%</strong></span></div>
          <div class="row"><span class="label">Latency</span><span class="value">BFF <strong>${b.elapsed}</strong> ms vs NSW <strong>${n.elapsed}</strong> ms → <strong style="color: ${speedDelta < 0 ? 'var(--ok)' : 'var(--warn)'};">BFF ${speedDelta >= 0 ? '+' : ''}${speedDelta} ms</strong></span></div>
          <div class="row"><span class="label">Note</span><span class="value" style="color: var(--muted);">BFF latency includes the BFF's call out to NSW + a tiny processing overhead. The size win is what matters most for mobile data plans.</span></div>
        </div>
      `;
    })();

    return `
      <div class="inspector-status">
        <span class="badge ok">COMPARE</span>
        <span style="font-family: var(--mono); font-size: 12px;">${esc(e.name)}</span>
        <span class="inspector-url">BFF ${esc(bffReq.url)}</span>
        <span class="inspector-url">NSW ${esc(nswUrl)}</span>
      </div>
      ${summary}
      <div class="cmp-grid">
        ${cell(bffRes, 'BFF')}
        ${cell(nswRes, 'NSW direct (via /internal/passthrough)')}
      </div>
      <p style="color: var(--muted); font-size: 11px; margin-top: 8px;">
        ⓘ NSW comparison uses the BFF's <code>/internal/passthrough</code> endpoint (dev-only; disabled in production).
        If you see "passthrough_failed", verify <code>BFF_DEV_PASSTHROUGH=true</code> is set in <code>local.properties</code> and restart the server.
      </p>
    `;
  }

      </div>
