<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KRAIL · Live Track Tester</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* KRAIL app design language (taj theme, dark):
   surface #1C1B1A · onSurface #FCF6F1 · softLabel #B0B0B0 · past #2C2B2A
   deviationEarly #00B219 · deviationLate #FF2B2B · alert #F4B400
   mode colors: train #F6891F metro #009B77 bus #00B5EF lightrail #E4022D
                ferry #5AB031 coach #742282 */
:root {
  --bg:#121110; --surface:#1C1B1A; --surface2:#2C2B2A; --border:#3a3836;
  --fg:#FCF6F1; --soft:#B0B0B0; --dim:#8F8F8F;
  --early:#00B219; --late:#FF2B2B; --alert:#F4B400;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,system-ui,sans-serif; }
header { display:flex; gap:16px; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:1000;}
header h1 { font-size:15px; margin:0; white-space:nowrap; }
header a { color:var(--soft); font-size:12px; text-decoration:none; margin-left:auto; }
label { font-size:12px; color:var(--soft); display:flex; gap:6px; align-items:center; }
input { background:var(--bg); border:1px solid var(--border); color:var(--fg); border-radius:8px; padding:5px 8px; font:12px var(--mono); }
button { background:var(--surface2); border:1px solid var(--border); color:var(--fg); border-radius:10px; padding:6px 14px; cursor:pointer; font-size:13px; font-weight:700; }
button.primary { background:#F6891F; border-color:#F6891F; color:#fff; }
button:disabled { opacity:.35; cursor:default; }
button.danger { border-color:var(--late); color:var(--late); background:transparent; }
.wrap { display:grid; grid-template-columns: 370px 1fr; height:calc(100vh - 49px); }
.side { border-right:1px solid var(--border); overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
.main { display:grid; grid-template-rows: minmax(0,1fr) minmax(0,48%); }
#map { width:100%; height:100%; background:#0a0d12; }
.bottom { border-top:1px solid var(--border); display:grid; grid-template-columns: 1fr 320px; min-height:0; }
.panel { border-radius:12px; background:var(--surface); padding:12px; }
.panel h2 { font-size:11px; margin:0 0 8px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; }
.row { display:flex; gap:8px; margin-bottom:6px; flex-wrap:wrap; align-items:end; }

/* journey cards — mirrors JourneyCard collapsed state */
.journey { border-radius:12px; background:var(--surface2); padding:12px; margin-bottom:8px; cursor:pointer; border:2px solid transparent; }
.journey:hover { border-color:var(--soft); }
.journey.picked { border-color:var(--early); }
.journey .times { display:flex; align-items:baseline; gap:8px; }
.journey .dep { font-size:17px; font-weight:800; }
.journey .arr { color:var(--soft); }
.journey .dur { margin-left:auto; color:var(--soft); font-size:12px; }
.journey .modes { display:flex; gap:6px; margin-top:8px; align-items:center; flex-wrap:wrap; }
.journey .route { color:var(--dim); font-size:12px; margin-top:4px; }

/* mode icon — single letter in colored circle, white text (TransportModeIcon) */
.mi { display:inline-flex; width:22px; height:22px; border-radius:50%; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:800; flex:none; }
/* line badge — rounded pill, mode bg, white text (TransportModeBadge) */
.badge { display:inline-block; border-radius:6px; padding:1px 8px; color:#fff; font-size:12px; font-weight:800; }

/* NOW card */
.nowcard { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--surface); }
.nowcard .headline { font-size:19px; font-weight:800; display:flex; align-items:center; gap:10px; }
.nowcard .sub { color:var(--soft); font-size:13px; margin-top:3px; }
.chip { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:700; margin:0 8px 4px 0; border:1px solid var(--border); color:var(--soft); }
.chip.early { color:#fff; background:var(--early); border-color:var(--early); }
.chip.late { color:#fff; background:var(--late); border-color:var(--late); }
.chip.alert { color:#1C1B1A; background:var(--alert); border-color:var(--alert); }

/* timeline — LegView style: mode-colored connector + dots */
.tlwrap { overflow-y:auto; min-height:0; background:var(--bg); }
.timeline { padding:10px 0 24px; }
.tl-stop { display:grid; grid-template-columns: 62px 30px 1fr auto; align-items:center; padding:4px 14px 4px 8px; }
.tl-stop .t { font:12px var(--mono); color:var(--soft); text-align:right; padding-right:4px;}
.tl-stop .name { font-weight:600; font-size:13px; }
.tl-stop .sid { font:10px var(--mono); color:var(--dim); margin-left:6px; font-weight:400; }
.tl-stop .delta { font:11px var(--mono); padding-left:8px; }
.tl-dot { width:30px; height:100%; min-height:26px; position:relative; }
.tl-dot::before { content:''; position:absolute; left:50%; top:-6px; bottom:-6px; width:3px; background:var(--mode,#555); transform:translateX(-50%); }
.tl-first .tl-dot::before { top:50%; } .tl-last .tl-dot::before { bottom:50%; }
.tl-dot i { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:12px; height:12px; border-radius:50%; background:var(--bg); border:3px solid var(--mode,#555); }
.tl-DEPARTED { opacity:.45; } .tl-DEPARTED .tl-dot i { background:var(--mode); }
.tl-CURRENT { background:color-mix(in srgb, var(--mode) 18%, transparent); }
.tl-CURRENT .name { font-size:15px; font-weight:800; }
.tl-CURRENT .tl-dot i { width:16px; height:16px; background:#fff; }
.tl-SKIPPED .name { text-decoration:line-through; color:var(--late); }
.tl-first .name, .tl-last .name { font-size:14px; font-weight:800; }
.late-d { color:var(--late); } .early-d,.ontime-d { color:var(--early); }

.cars { display:flex; gap:3px; margin:8px 0 2px; }
.car { width:30px; height:18px; border-radius:4px; font:9px var(--mono); display:flex; align-items:center; justify-content:center; color:#fff; background:var(--surface2); }
.lv-1,.lv-2 { background:#1a7f37; } .lv-3,.lv-4 { background:#9e6a03; } .lv-5,.lv-6 { background:#b62324; } .lv-7 { background:#555; }

.rawwrap { border-left:1px solid var(--border); display:flex; flex-direction:column; min-height:0;}
.rawwrap h2 { font-size:11px; color:var(--dim); margin:8px 12px 4px; text-transform:uppercase;}
pre { margin:0; padding:0 12px 12px; font:11px var(--mono); color:var(--dim); overflow:auto; flex:1; }
.log { font:11px var(--mono); color:var(--dim); max-height:110px; overflow-y:auto; }
.log .err { color:var(--late); }
.meta { font:11px var(--mono); color:var(--dim); }
.legtabs { display:flex; gap:6px; padding:8px 12px 0; flex-wrap:wrap; background:var(--bg);}
.legtab { font-size:12px; padding:3px 12px; border-radius:14px; cursor:pointer; color:var(--soft); background:var(--surface); display:inline-flex; gap:6px; align-items:center;}
.legtab.active { color:#fff; background:var(--mode,#555); font-weight:700; }
</style>
</head>
<body>
<header>
  <h1>🛰 KRAIL · Live Track Tester</h1>
  <label>BFF <input id="baseUrl" value="http://localhost:8080" size="20"></label>
  <span class="meta" id="pollMeta">idle</span>
  <a href="api-tester.html">← API tester</a>
</header>

<div class="wrap">
  <div class="side">
    <div class="panel">
      <h2>1 · Find a trip</h2>
      <div class="row">
        <label>From <input id="origin" value="200060" size="8"></label>
        <label>To <input id="dest" value="2135110" size="8"></label>
        <button id="findBtn" class="primary">Find</button>
      </div>
      <div id="journeys" class="meta">Central → Ashfield prefilled.</div>
    </div>

    <div class="panel">
      <h2>2 · Track</h2>
      <div class="row">
        <button id="startBtn" class="primary" disabled>▶ Start</button>
        <button id="stopBtn" class="danger" disabled>■ Stop</button>
        <button id="onceBtn" disabled>Poll once</button>
      </div>
      <div class="log" id="log"></div>
    </div>

    <div class="panel">
      <h2>Share-link simulator</h2>
      <div class="row">
        <input id="shareLink" placeholder="krail.app/trip?d=… or payload" style="flex:1">
        <button id="decodeBtn">Decode</button>
      </div>
      <div id="shareInfo" class="meta"></div>
    </div>
  </div>

  <div class="main">
    <div id="map"></div>
    <div class="bottom">
      <div style="display:flex;flex-direction:column;min-height:0">
        <div class="nowcard" id="nowcard">
          <div class="headline" style="color:var(--dim);font-size:14px;font-weight:400">Pick a journey and press Start — live status appears here.</div>
        </div>
        <div class="legtabs" id="legtabs"></div>
        <div class="tlwrap"><div class="timeline" id="timeline"></div></div>
      </div>
      <div class="rawwrap"><h2>Raw response</h2><pre id="raw"></pre></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
const $ = id => document.getElementById(id);
const base = () => ($('baseUrl').value || 'http://localhost:8080').replace(/\/+$/, '');
const today = () => new Date().toLocaleDateString('sv-SE', {timeZone:'Australia/Sydney'}).replaceAll('-','');
const fmtT = epoch => epoch ? new Date(epoch * 1000).toLocaleTimeString('en-AU', {hour:'2-digit',minute:'2-digit',timeZone:'Australia/Sydney'}) : '—';
const log = (msg, err) => {
  const el = document.createElement('div');
  if (err) el.className = 'err';
  el.textContent = `${new Date().toTimeString().slice(0,8)} ${msg}`;
  $('log').prepend(el);
};

// KRAIL transport mode palette (core/transport/TransportMode.kt)
const MODE = {
  1:{ c:'#F6891F', letter:'T', name:'Train' },
  2:{ c:'#009B77', letter:'M', name:'Metro' },
  4:{ c:'#E4022D', letter:'L', name:'Light Rail' },
  5:{ c:'#00B5EF', letter:'B', name:'Bus' },
  7:{ c:'#742282', letter:'C', name:'Coach' },
  9:{ c:'#5AB031', letter:'F', name:'Ferry' },
  11:{ c:'#00B5EF', letter:'B', name:'School Bus' },
};
const modeOf = pc => MODE[pc] || { c:'#777', letter:'?', name:'?' };
const miHtml = pc => { const m = modeOf(pc); return `<span class="mi" style="background:${m.c}">${m.letter}</span>`; };
// Per app convention: buses get a line-number badge, rail modes show icon only.
const badgeHtml = (pc, line) => (pc === 5 || pc === 11) && line
  ? `<span class="badge" style="background:${modeOf(pc).c}">${line}</span>` : '';

// ---- map ------------------------------------------------------------
const map = L.map('map').setView([-33.87, 151.207], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
let vehicleMarkers = {}, routeLayers = [], stopLayer = null, fitted = false;

function vehicleIcon(pc, bearing, stale) {
  const m = modeOf(pc);
  const color = stale ? '#8F8F8F' : m.c;
  const rot = bearing != null ? `transform:rotate(${bearing}deg);` : '';
  return L.divIcon({ className:'', iconSize:[28,28],
    html:`<div style="width:26px;height:26px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 0 8px ${color};color:#fff;font:800 13px sans-serif;display:flex;align-items:center;justify-content:center;${rot}">${m.letter}</div>` });
}

// ---- trip context ------------------------------------------------------
let ctx = { stopMeta:{}, planned:{}, legCoords:{} };
let pickedLegs = [];
const cleanId = id => (id || '').replace(/[^A-Za-z0-9:]/g,'').slice(0,40);

function harvestLegContext(leg, legRef) {
  ctx.planned[legRef] = {};
  (leg.stopSequence || []).forEach(s => {
    const id = cleanId(s.id);
    if (!id) return;
    if (!ctx.stopMeta[id]) ctx.stopMeta[id] = { name: s.disassembledName || s.name || '', lat: s.coord?.[0], lon: s.coord?.[1] };
    const pt = s.departureTimePlanned || s.arrivalTimePlanned;
    if (pt) ctx.planned[legRef][id] = Math.floor(Date.parse(pt) / 1000);
  });
  if (Array.isArray(leg.coords) && leg.coords.length > 1) ctx.legCoords[legRef] = leg.coords;
}

// ---- trip picker ------------------------------------------------------
$('findBtn').onclick = async () => {
  $('journeys').innerHTML = '<span class="meta">searching…</span>';
  try {
    const url = `${base()}/v1/tp/trip?outputFormat=rapidJSON&coordOutputFormat=EPSG%3A4326&depArrMacro=dep`
      + `&type_origin=any&name_origin=${encodeURIComponent($('origin').value.trim())}`
      + `&type_destination=any&name_destination=${encodeURIComponent($('dest').value.trim())}`
      + `&calcNumberOfTrips=5&TfNSWTR=true&version=10.2.1.42`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`trip ${r.status}`);
    renderJourneys((await r.json()).journeys || []);
  } catch (e) { $('journeys').innerHTML = `<span class="meta" style="color:var(--late)">${e.message}</span>`; log(e.message, true); }
};

function renderJourneys(journeys) {
  $('journeys').innerHTML = '';
  journeys.forEach(j => {
    const legs = (j.legs || []).filter(l => l.transportation?.properties?.RealtimeTripId);
    if (!legs.length) return;
    const div = document.createElement('div');
    div.className = 'journey';
    const dep = legs[0]?.origin?.departureTimeEstimated || legs[0]?.origin?.departureTimePlanned || '';
    const arr = legs.at(-1)?.destination?.arrivalTimeEstimated || legs.at(-1)?.destination?.arrivalTimePlanned || '';
    const durMin = dep && arr ? Math.round((Date.parse(arr) - Date.parse(dep)) / 60000) : null;
    div.innerHTML =
      `<div class="times"><span class="dep">${dep.slice(11,16)}</span><span class="arr">→ ${arr.slice(11,16)}</span>${durMin ? `<span class="dur">🕐 ${durMin} min</span>` : ''}</div>` +
      `<div class="modes">${legs.map(l => {
        const pc = l.transportation.product?.class;
        const line = l.transportation?.disassembledName || l.transportation?.number || '';
        return miHtml(pc) + (badgeHtml(pc, line) || `<span style="color:var(--soft);font-size:12px;font-weight:700">${line}</span>`);
      }).join('<span style="color:var(--dim)">›</span>')}</div>` +
      `<div class="route">${legs.map(l => (l.origin?.disassembledName || '').split(',')[0]).filter(Boolean).join(' → ')}</div>`;
    div.onclick = () => {
      ctx = { stopMeta:{}, planned:{}, legCoords:{} };
      pickedLegs = legs.map((l, i) => {
        const ref = `leg-${i+1}`;
        harvestLegContext(l, ref);
        return {
          leg_ref: ref,
          realtime_trip_id: l.transportation.properties.RealtimeTripId,
          transportation_id: l.transportation.id || '',
          product_class: l.transportation.product?.class || 0,
          origin_stop_id: cleanId(l.origin?.id),
          destination_stop_id: cleanId(l.destination?.id),
          service_date: today(),
          planned_departure_utc: l.origin?.departureTimePlanned || '',
          _label: l.transportation?.disassembledName || l.transportation?.number || '',
        };
      });
      document.querySelectorAll('.journey').forEach(x => x.classList.remove('picked'));
      div.classList.add('picked');
      $('startBtn').disabled = $('onceBtn').disabled = false;
      drawRoute();
      log(`picked: ${pickedLegs.map(l => l.realtime_trip_id).join(' + ')}`);
    };
    $('journeys').appendChild(div);
  });
  if (!$('journeys').children.length) $('journeys').innerHTML = '<span class="meta">no trackable journeys found</span>';
}

function drawRoute() {
  routeLayers.forEach(l => map.removeLayer(l)); routeLayers = [];
  if (stopLayer) map.removeLayer(stopLayer);
  stopLayer = L.layerGroup().addTo(map);
  const all = [];
  pickedLegs.forEach(leg => {
    const mc = modeOf(leg.product_class).c;
    const coords = ctx.legCoords[leg.leg_ref];
    if (coords) {
      routeLayers.push(L.polyline(coords, { color: mc, weight:5, opacity:.75 }).addTo(map));
      all.push(...coords);
    }
    Object.keys(ctx.planned[leg.leg_ref] || {}).forEach(id => {
      const m = ctx.stopMeta[id];
      if (m?.lat) {
        L.circleMarker([m.lat, m.lon], { radius:4, color:'#fff', fillColor: mc, fillOpacity:1, weight:2 })
          .bindTooltip(m.name || id).addTo(stopLayer);
        all.push([m.lat, m.lon]);
      }
    });
  });
  if (all.length) { map.fitBounds(all, { padding:[30,30] }); fitted = true; }
}

// ---- share link simulator ----------------------------------------------
$('decodeBtn').onclick = () => {
  try {
    let raw = $('shareLink').value.trim();
    const m = raw.match(/[?&]d=([^&]+)/);
    if (m) raw = m[1];
    const json = JSON.parse(atob(raw.replace(/-/g,'+').replace(/_/g,'/')));
    $('shareInfo').textContent = JSON.stringify(json);
    const legs = (json.legs || []).map((l, i) => ({
      leg_ref: `share-${i+1}`,
      realtime_trip_id: l.realtimeTripId || l.realtime_trip_id || '',
      transportation_id: l.transportationId || '',
      product_class: l.productClass || l.product_class || 0,
      origin_stop_id: l.originStopId || '', destination_stop_id: l.destinationStopId || '',
      service_date: l.serviceDate || today(),
      planned_departure_utc: l.plannedDepartureUtc || '',
      _label: 'shared',
    }));
    if (legs.some(l => !l.realtime_trip_id)) log('v1 payload (no realtimeTripId) — not trackable; needs v2', true);
    pickedLegs = legs.filter(l => l.realtime_trip_id);
    ctx = { stopMeta:{}, planned:{}, legCoords:{} };
    $('startBtn').disabled = $('onceBtn').disabled = pickedLegs.length === 0;
    log(`share payload: ${legs.length} leg(s), ${pickedLegs.length} trackable`);
  } catch (e) { $('shareInfo').textContent = `decode failed: ${e.message}`; }
};

// ---- poll loop ----------------------------------------------------------
let timer = null, countdown = null, nextAt = 0, lastResp = null, activeLeg = 0;

async function poll() {
  const t0 = performance.now();
  try {
    const r = await fetch(`${base()}/api/v1/track/snapshot`, {
      method:'POST', headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify({ legs: pickedLegs.map(({_label, ...l}) => l), include_geometry:false }),
    });
    const ms = Math.round(performance.now() - t0);
    const body = await r.json();
    if (!r.ok) throw new Error(`${r.status} ${JSON.stringify(body.error || body)}`);
    log(`poll ${ms}ms · ${body.legs.map(l => l.status).join(', ')}`);
    lastResp = body;
    render();
    return body.suggested_poll_seconds || 30;
  } catch (e) { log(`poll failed: ${e.message}`, true); return 30; }
}
async function loopOnce() {
  const wait = await poll();
  nextAt = Date.now() + wait * 1000;
  timer = setTimeout(loopOnce, wait * 1000);
}
$('startBtn').onclick = () => {
  stopLoop(); loopOnce();
  $('stopBtn').disabled = false; $('startBtn').disabled = true;
  countdown = setInterval(() => {
    $('pollMeta').textContent = `tracking · next poll ${Math.max(0, Math.round((nextAt - Date.now())/1000))}s`;
  }, 500);
};
function stopLoop() {
  clearTimeout(timer); clearInterval(countdown); timer = countdown = null;
  $('pollMeta').textContent = 'idle';
  $('stopBtn').disabled = true; $('startBtn').disabled = pickedLegs.length === 0;
}
$('stopBtn').onclick = stopLoop;
$('onceBtn').onclick = poll;

// ---- render --------------------------------------------------------------
const LV_NUM = {LEVEL_UNSPECIFIED:0,EMPTY:1,MANY_SEATS_AVAILABLE:2,FEW_SEATS_AVAILABLE:3,STANDING_ROOM_ONLY:4,CRUSHED_STANDING_ROOM_ONLY:5,FULL:6,NOT_ACCEPTING_PASSENGERS:7};
const LV_TEXT = {EMPTY:'empty',MANY_SEATS_AVAILABLE:'many seats',FEW_SEATS_AVAILABLE:'few seats',STANDING_ROOM_ONLY:'standing room',CRUSHED_STANDING_ROOM_ONLY:'crushed',FULL:'full'};
const stopName = id => ctx.stopMeta[id]?.name || id;
const plannedFor = (leg, stopId) => ctx.planned[leg.leg_ref]?.[stopId] || 0;

function delayChip(leg) {
  if (!leg || leg.delay_seconds === undefined) return '';
  const d = leg.delay_seconds, m = Math.round(Math.abs(d) / 60);
  if (d > 60)  return `<span class="chip late">${m} min late</span>`;
  if (d < -60) return `<span class="chip early">${m} min early</span>`;
  return `<span class="chip early">on time</span>`;
}

function render() {
  const resp = lastResp; if (!resp) return;
  $('raw').textContent = JSON.stringify(resp, null, 1);
  const now = resp.fetched_at_epoch_sec;

  $('legtabs').innerHTML = '';
  resp.legs.forEach((leg, i) => {
    const pc = pickedLegs[i]?.product_class;
    const tab = document.createElement('span');
    tab.className = 'legtab' + (i === activeLeg ? ' active' : '');
    tab.style.setProperty('--mode', modeOf(pc).c);
    tab.innerHTML = `${miHtml(pc)} ${pickedLegs[i]?._label || leg.leg_ref} · ${leg.status.replaceAll('_',' ').toLowerCase()}`;
    tab.onclick = () => { activeLeg = i; render(); };
    $('legtabs').appendChild(tab);
  });
  const li = Math.min(activeLeg, resp.legs.length - 1);
  const leg = resp.legs[li];
  if (!leg) return;
  const pc = pickedLegs[li]?.product_class;
  const mc = modeOf(pc).c;

  // NOW card
  let headline = '', sub = '', chips = '';
  const cur = leg.stops?.find(s => s.state === 'CURRENT');
  const next = leg.stops?.find(s => s.state === 'UPCOMING');
  if (leg.status === 'TRACKING') {
    headline = cur ? `At ${stopName(cur.stop_id)}` : next ? `Next: ${stopName(next.stop_id)}` : 'On the move';
    if (next) sub = `${stopName(next.stop_id)} · ${fmtT(next.estimated_epoch_sec || plannedFor(leg, next.stop_id))}`;
    chips = delayChip(leg);
    if (leg.fleet) chips += `<span class="chip" style="border-color:${mc};color:${mc}">${leg.fleet.display_name}${leg.fleet.car_count ? ' · ' + leg.fleet.car_count + ' cars' : ''}</span>`;
    if (leg.vehicle) {
      const age = now - leg.vehicle.measured_at_epoch_sec;
      chips += `<span class="chip ${age > 90 ? 'late' : ''}">📍 ${age}s ago${age > 90 ? ' — STALE' : ''}</span>`;
      if (leg.vehicle.speed_mps !== undefined) chips += `<span class="chip">${Math.round(leg.vehicle.speed_mps * 3.6)} km/h</span>`;
    }
  } else if (leg.status === 'NOT_STARTED') {
    const first = leg.stops?.[0];
    headline = 'Not started yet';
    sub = first ? `Departs ${stopName(first.stop_id)} at ${fmtT(first.estimated_epoch_sec || plannedFor(leg, first.stop_id))}` : '';
    chips = `<span class="chip">scheduled</span>` + delayChip(leg);
  } else {
    headline = { NO_REALTIME:'No live data for this service', ENDED:'Trip completed', EXPIRED:'Trip has ended (link expired)', UPSTREAM_UNAVAILABLE:'NSW feed unavailable — retrying' }[leg.status] || leg.status;
    chips = `<span class="chip">${leg.status.replaceAll('_',' ').toLowerCase()}</span>`;
  }
  let carsHtml = '';
  if (leg.occupancy?.cars?.length) {
    carsHtml = `<div class="cars">` + leg.occupancy.cars.map(c =>
      `<div class="car lv-${LV_NUM[c.level] ?? 0}" title="${LV_TEXT[c.level] || 'unknown'}">${(c.label || c.sequence).toString().slice(0,4)}</div>`).join('') + `</div>`
      + `<div class="meta">carriage occupancy (front → back)</div>`;
  } else if (leg.occupancy?.overall && leg.occupancy.overall !== 'LEVEL_UNSPECIFIED') {
    carsHtml = `<div class="meta" style="margin-top:6px">vehicle occupancy: <b style="color:var(--fg)">${LV_TEXT[leg.occupancy.overall] || leg.occupancy.overall}</b></div>`;
  }
  $('nowcard').innerHTML = `<div class="headline">${miHtml(pc)} ${headline}</div>` +
    (sub ? `<div class="sub">${sub}</div>` : '') +
    `<div style="margin-top:8px">${chips}</div>` + carsHtml;

  // timeline
  $('timeline').innerHTML = '';
  $('timeline').style.setProperty('--mode', mc);
  const stops = leg.stops || [];
  stops.forEach((s, idx) => {
    const el = document.createElement('div');
    el.className = `tl-stop tl-${s.state}` + (idx === 0 ? ' tl-first' : '') + (idx === stops.length - 1 ? ' tl-last' : '');
    el.style.setProperty('--mode', mc);
    const planned = plannedFor(leg, s.stop_id);
    const est = s.estimated_epoch_sec || 0;
    let delta = '<span></span>';
    if (est && planned) {
      const d = Math.round((est - planned) / 60);
      delta = d > 0 ? `<span class="delta late-d">+${d}m</span>` : d < 0 ? `<span class="delta early-d">${d}m</span>` : `<span class="delta ontime-d">✓</span>`;
    }
    el.innerHTML =
      `<span class="t">${fmtT(est || planned)}</span>` +
      `<span class="tl-dot"><i></i></span>` +
      `<span class="name">${stopName(s.stop_id)}${ctx.stopMeta[s.stop_id]?.name ? `<span class="sid">${s.stop_id}</span>` : ''}</span>` +
      delta;
    $('timeline').appendChild(el);
  });
  const curEl = $('timeline').querySelector('.tl-CURRENT');
  if (curEl) curEl.scrollIntoView({ block:'center', behavior:'smooth' });

  // map markers
  resp.legs.forEach((lg, i) => {
    if (!lg.vehicle) return;
    const pos = [lg.vehicle.latitude, lg.vehicle.longitude];
    const stale = (now - lg.vehicle.measured_at_epoch_sec) > 90;
    const key = lg.leg_ref;
    if (!vehicleMarkers[key]) vehicleMarkers[key] = L.marker(pos).addTo(map);
    vehicleMarkers[key].setLatLng(pos)
      .setIcon(vehicleIcon(pickedLegs[i]?.product_class, lg.vehicle.bearing_degrees, stale))
      .bindTooltip(`${pickedLegs[i]?._label || key} · ${lg.fleet?.display_name || ''}`);
    if (!fitted) { map.setView(pos, 14); fitted = true; }
  });
}
</script>
</body>
</html>
