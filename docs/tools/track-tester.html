<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KRAIL BFF · Track Tester</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --dim:#8b949e;
  --accent:#58a6ff; --accent-soft:#1f6feb33; --ok:#3fb950; --warn:#d29922; --bad:#f85149;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,system-ui,sans-serif; }
header { display:flex; gap:16px; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:1000;}
header h1 { font-size:15px; margin:0; white-space:nowrap; }
header a { color:var(--accent); font-size:12px; text-decoration:none; margin-left:auto; }
label { font-size:12px; color:var(--dim); display:flex; gap:6px; align-items:center; }
input { background:var(--bg); border:1px solid var(--border); color:var(--fg); border-radius:6px; padding:5px 8px; font:12px var(--mono); }
button { background:var(--accent-soft); border:1px solid var(--accent); color:var(--fg); border-radius:6px; padding:6px 14px; cursor:pointer; font-size:13px; font-weight:600; }
button:disabled { opacity:.35; cursor:default; }
button.danger { border-color:var(--bad); background:#f8514922; }
.wrap { display:grid; grid-template-columns: 360px 1fr; height:calc(100vh - 49px); }
.side { border-right:1px solid var(--border); overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
.main { display:grid; grid-template-rows: minmax(0,1fr) minmax(0,46%); }
#map { width:100%; height:100%; background:#0a0d12; }
.bottom { border-top:1px solid var(--border); display:grid; grid-template-columns: 1fr 340px; min-height:0; }
.panel { border:1px solid var(--border); border-radius:8px; background:var(--panel); padding:10px; }
.panel h2 { font-size:11px; margin:0 0 8px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; }
.row { display:flex; gap:8px; margin-bottom:6px; flex-wrap:wrap; align-items:end; }
.journey { border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:8px; cursor:pointer; }
.journey:hover { border-color:var(--accent); }
.journey.picked { border-color:var(--ok); background:#3fb95011; }
.journey .time { font-size:15px; font-weight:700; }
.journey .legs { color:var(--dim); font-size:12px; margin-top:2px; }
.modechip { display:inline-block; background:var(--accent-soft); border-radius:4px; padding:0 6px; font-size:11px; margin-right:4px; }

/* NOW card */
.nowcard { padding:14px 16px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,#161b22,#0d1117); }
.nowcard .headline { font-size:18px; font-weight:800; }
.nowcard .sub { color:var(--dim); font-size:13px; margin-top:2px; }
.chip { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:700; margin-right:8px; border:1px solid var(--border); }
.chip.ok { color:#fff; background:#1a7f37; border-color:#1a7f37; }
.chip.warn { color:#fff; background:#9e6a03; border-color:#9e6a03; }
.chip.bad { color:#fff; background:#b62324; border-color:#b62324; }
.chip.info { color:var(--accent); border-color:var(--accent); }
.chip.grey { color:var(--dim); }

/* timeline */
.tlwrap { overflow-y:auto; min-height:0; }
.timeline { padding:6px 0 20px; }
.tl-stop { display:grid; grid-template-columns: 64px 26px 1fr auto; align-items:center; padding:5px 14px 5px 10px; border-left:0; }
.tl-stop .t { font:12px var(--mono); color:var(--dim); text-align:right; padding-right:4px;}
.tl-stop .name { font-weight:600; }
.tl-stop .sid { font:10px var(--mono); color:var(--dim); margin-left:6px; font-weight:400; }
.tl-stop .delta { font:11px var(--mono); }
.tl-dot { width:26px; text-align:center; color:var(--dim); position:relative; }
.tl-dot::before { content:''; position:absolute; left:50%; top:-12px; bottom:-12px; width:2px; background:var(--border); transform:translateX(-50%); z-index:0;}
.tl-dot span { position:relative; z-index:1; background:var(--bg); display:inline-block; border-radius:50%; width:14px; height:14px; line-height:14px; font-size:9px; border:2px solid var(--border); }
.tl-DEPARTED { opacity:.45; }
.tl-DEPARTED .tl-dot span { background:var(--ok); border-color:var(--ok); }
.tl-CURRENT { background:#1f6feb22; }
.tl-CURRENT .name { color:var(--accent); font-size:15px; }
.tl-CURRENT .tl-dot span { background:var(--accent); border-color:var(--accent); width:16px; height:16px; }
.tl-SKIPPED .name { text-decoration:line-through; color:var(--bad); }
.tl-UPCOMING .tl-dot span { background:var(--bg); }
.late { color:var(--warn); } .verylate { color:var(--bad); } .early,.ontime { color:var(--ok); }

.cars { display:flex; gap:3px; margin:8px 0 2px; }
.car { width:30px; height:18px; border-radius:4px; border:1px solid var(--border); font:9px var(--mono); display:flex; align-items:center; justify-content:center; color:#fff; }
.lv-1,.lv-2 { background:#1a7f37; } .lv-3,.lv-4 { background:#9e6a03; } .lv-5,.lv-6 { background:#b62324; } .lv-7,.lv-0 { background:#30363d; }

.rawwrap { border-left:1px solid var(--border); display:flex; flex-direction:column; min-height:0;}
.rawwrap h2 { font-size:11px; color:var(--dim); margin:8px 12px 4px; text-transform:uppercase;}
pre { margin:0; padding:0 12px 12px; font:11px var(--mono); color:var(--dim); overflow:auto; flex:1; }
.log { font:11px var(--mono); color:var(--dim); max-height:120px; overflow-y:auto; }
.log .err { color:var(--bad); }
.meta { font:11px var(--mono); color:var(--dim); }
.legtabs { display:flex; gap:6px; padding:8px 12px 0; flex-wrap:wrap;}
.legtab { font-size:12px; padding:3px 10px; border:1px solid var(--border); border-radius:14px; cursor:pointer; color:var(--dim); }
.legtab.active { color:var(--fg); border-color:var(--accent); background:var(--accent-soft); }
</style>
</head>
<body>
<header>
  <h1>🛰 KRAIL · Live Track Tester</h1>
  <label>BFF <input id="baseUrl" value="http://localhost:8080" size="20"></label>
  <span class="meta" id="pollMeta">idle</span>
  <a href="api-tester.html">← API tester</a>
</header>

<div class="wrap">
  <div class="side">
    <div class="panel">
      <h2>1 · Find a trip</h2>
      <div class="row">
        <label>From <input id="origin" value="200060" size="8"></label>
        <label>To <input id="dest" value="2135110" size="8"></label>
        <button id="findBtn">Find</button>
      </div>
      <div id="journeys" class="meta">Central → Ashfield prefilled. Stop IDs from the app / api-tester.</div>
    </div>

    <div class="panel">
      <h2>2 · Track</h2>
      <div class="row">
        <button id="startBtn" disabled>▶ Start</button>
        <button id="stopBtn" class="danger" disabled>■ Stop</button>
        <button id="onceBtn" disabled>Poll once</button>
      </div>
      <div class="log" id="log"></div>
    </div>

    <div class="panel">
      <h2>Share-link simulator</h2>
      <div class="row">
        <input id="shareLink" placeholder="krail.app/trip?d=… or payload" style="flex:1">
        <button id="decodeBtn">Decode</button>
      </div>
      <div id="shareInfo" class="meta"></div>
    </div>
  </div>

  <div class="main">
    <div id="map"></div>
    <div class="bottom">
      <div style="display:flex;flex-direction:column;min-height:0">
        <div class="nowcard" id="nowcard">
          <div class="headline" style="color:var(--dim);font-size:14px;font-weight:400">Pick a journey and press Start — live status appears here.</div>
        </div>
        <div class="legtabs" id="legtabs"></div>
        <div class="tlwrap"><div class="timeline" id="timeline"></div></div>
      </div>
      <div class="rawwrap"><h2>Raw response</h2><pre id="raw"></pre></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
const $ = id => document.getElementById(id);
const base = () => ($('baseUrl').value || 'http://localhost:8080').replace(/\/+$/, '');
const today = () => new Date().toLocaleDateString('sv-SE', {timeZone:'Australia/Sydney'}).replaceAll('-','');
const fmtT = epoch => epoch ? new Date(epoch * 1000).toLocaleTimeString('en-AU', {hour:'2-digit',minute:'2-digit',timeZone:'Australia/Sydney'}) : '—';
const log = (msg, err) => {
  const el = document.createElement('div');
  if (err) el.className = 'err';
  el.textContent = `${new Date().toTimeString().slice(0,8)} ${msg}`;
  $('log').prepend(el);
};

// ---- map ------------------------------------------------------------
const map = L.map('map').setView([-33.87, 151.207], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
let vehicleMarkers = {}, routeLayers = [], stopLayer = null, fitted = false;

function vehicleIcon(bearing, stale) {
  const has = bearing != null;
  const color = stale ? '#8b949e' : '#58a6ff';
  return L.divIcon({ className:'', iconSize:[26,26],
    html:`<div style="font-size:22px;color:${color};transform:rotate(${has?bearing:0}deg);text-shadow:0 0 5px #000;filter:drop-shadow(0 0 3px ${color})">${has?'➤':'●'}</div>` });
}

// ---- trip context (names, coords, planned times from the trip call) ---
// stopMeta: id -> {name, lat, lon};  planned: legRef -> stopId -> epoch
let ctx = { stopMeta:{}, planned:{}, legCoords:{} };
let pickedLegs = [];

function cleanId(id) { return (id || '').replace(/[^A-Za-z0-9:]/g,'').slice(0,40); }

function harvestLegContext(leg, legRef) {
  const seq = leg.stopSequence || [];
  ctx.planned[legRef] = {};
  seq.forEach(s => {
    const id = cleanId(s.id);
    if (!id) return;
    const name = s.disassembledName || s.name || '';
    const c = s.coord; // [lat, lon]
    if (!ctx.stopMeta[id]) ctx.stopMeta[id] = { name, lat: c?.[0], lon: c?.[1] };
    const pt = s.departureTimePlanned || s.arrivalTimePlanned;
    if (pt) ctx.planned[legRef][id] = Math.floor(Date.parse(pt) / 1000);
  });
  // leg.coords = the actual path geometry from the trip planner
  if (Array.isArray(leg.coords) && leg.coords.length > 1) ctx.legCoords[legRef] = leg.coords;
}

// ---- trip picker ------------------------------------------------------
$('findBtn').onclick = async () => {
  $('journeys').innerHTML = '<span class="meta">searching…</span>';
  try {
    const url = `${base()}/v1/tp/trip?outputFormat=rapidJSON&coordOutputFormat=EPSG%3A4326&depArrMacro=dep`
      + `&type_origin=any&name_origin=${encodeURIComponent($('origin').value.trim())}`
      + `&type_destination=any&name_destination=${encodeURIComponent($('dest').value.trim())}`
      + `&calcNumberOfTrips=5&TfNSWTR=true&version=10.2.1.42`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`trip ${r.status}`);
    renderJourneys((await r.json()).journeys || []);
  } catch (e) { $('journeys').innerHTML = `<span class="meta" style="color:var(--bad)">${e.message}</span>`; log(e.message, true); }
};

const MODE_ICON = {1:'🚆',2:'🚇',4:'🚊',5:'🚌',7:'🚌',9:'⛴',11:'🚌'};

function renderJourneys(journeys) {
  $('journeys').innerHTML = '';
  journeys.forEach(j => {
    const legs = (j.legs || []).filter(l => l.transportation?.properties?.RealtimeTripId);
    if (!legs.length) return;
    const div = document.createElement('div');
    div.className = 'journey';
    const dep = legs[0]?.origin?.departureTimeEstimated || legs[0]?.origin?.departureTimePlanned || '';
    const arr = legs.at(-1)?.destination?.arrivalTimeEstimated || legs.at(-1)?.destination?.arrivalTimePlanned || '';
    div.innerHTML =
      `<div class="time">${dep.slice(11,16)} → ${arr.slice(11,16)}</div>` +
      `<div class="legs">${legs.map(l => `<span class="modechip">${MODE_ICON[l.transportation.product?.class] || '·'} ${l.transportation?.disassembledName || l.transportation?.number || '?'}</span>`).join('')}</div>` +
      `<div class="meta">${legs.map(l => (l.origin?.disassembledName || '').split(',')[0]).join(' → ')}</div>`;
    div.onclick = () => {
      ctx = { stopMeta:{}, planned:{}, legCoords:{} };
      pickedLegs = legs.map((l, i) => {
        const ref = `leg-${i+1}`;
        harvestLegContext(l, ref);
        return {
          leg_ref: ref,
          realtime_trip_id: l.transportation.properties.RealtimeTripId,
          transportation_id: l.transportation.id || '',
          product_class: l.transportation.product?.class || 0,
          origin_stop_id: cleanId(l.origin?.id),
          destination_stop_id: cleanId(l.destination?.id),
          service_date: today(),
          planned_departure_utc: l.origin?.departureTimePlanned || '',
          _label: `${MODE_ICON[l.transportation.product?.class] || ''} ${l.transportation?.disassembledName || l.transportation?.number || ''}`,
        };
      });
      document.querySelectorAll('.journey').forEach(x => x.classList.remove('picked'));
      div.classList.add('picked');
      $('startBtn').disabled = $('onceBtn').disabled = false;
      drawRoute();
      log(`picked: ${pickedLegs.map(l => l.realtime_trip_id).join(' + ')}`);
    };
    $('journeys').appendChild(div);
  });
  if (!$('journeys').children.length) $('journeys').innerHTML = '<span class="meta">no trackable journeys found</span>';
}

function drawRoute() {
  routeLayers.forEach(l => map.removeLayer(l)); routeLayers = [];
  if (stopLayer) { map.removeLayer(stopLayer); }
  stopLayer = L.layerGroup().addTo(map);
  const all = [];
  pickedLegs.forEach(leg => {
    const coords = ctx.legCoords[leg.leg_ref];
    if (coords) {
      const line = L.polyline(coords, { color:'#58a6ff', weight:4, opacity:.7 }).addTo(map);
      routeLayers.push(line);
      all.push(...coords);
    }
    Object.entries(ctx.planned[leg.leg_ref] || {}).forEach(([id]) => {
      const m = ctx.stopMeta[id];
      if (m?.lat) {
        L.circleMarker([m.lat, m.lon], { radius:3, color:'#8b949e', fillColor:'#0d1117', fillOpacity:1, weight:2 })
          .bindTooltip(m.name || id).addTo(stopLayer);
        all.push([m.lat, m.lon]);
      }
    });
  });
  if (all.length) { map.fitBounds(all, { padding:[30,30] }); fitted = true; }
}

// ---- share link simulator ----------------------------------------------
$('decodeBtn').onclick = () => {
  try {
    let raw = $('shareLink').value.trim();
    const m = raw.match(/[?&]d=([^&]+)/);
    if (m) raw = m[1];
    const json = JSON.parse(atob(raw.replace(/-/g,'+').replace(/_/g,'/')));
    $('shareInfo').textContent = JSON.stringify(json);
    const legs = (json.legs || []).map((l, i) => ({
      leg_ref: `share-${i+1}`,
      realtime_trip_id: l.realtimeTripId || l.realtime_trip_id || '',
      transportation_id: l.transportationId || '',
      product_class: l.productClass || l.product_class || 0,
      origin_stop_id: l.originStopId || '', destination_stop_id: l.destinationStopId || '',
      service_date: l.serviceDate || today(),
      planned_departure_utc: l.plannedDepartureUtc || '',
      _label: 'shared',
    }));
    if (legs.some(l => !l.realtime_trip_id)) log('v1 payload (no realtimeTripId) — not trackable; needs v2', true);
    pickedLegs = legs.filter(l => l.realtime_trip_id);
    ctx = { stopMeta:{}, planned:{}, legCoords:{} };
    $('startBtn').disabled = $('onceBtn').disabled = pickedLegs.length === 0;
    log(`share payload: ${legs.length} leg(s), ${pickedLegs.length} trackable`);
  } catch (e) { $('shareInfo').textContent = `decode failed: ${e.message}`; }
};

// ---- poll loop ----------------------------------------------------------
let timer = null, countdown = null, nextAt = 0, lastResp = null, activeLeg = 0;

async function poll() {
  const t0 = performance.now();
  try {
    const r = await fetch(`${base()}/api/v1/track/snapshot`, {
      method:'POST', headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify({ legs: pickedLegs.map(({_label, ...l}) => l), include_geometry:false }),
    });
    const ms = Math.round(performance.now() - t0);
    const body = await r.json();
    if (!r.ok) throw new Error(`${r.status} ${JSON.stringify(body.error || body)}`);
    log(`poll ${ms}ms · ${body.legs.map(l => l.status).join(', ')}`);
    lastResp = body;
    render();
    return body.suggested_poll_seconds || 30;
  } catch (e) { log(`poll failed: ${e.message}`, true); return 30; }
}

async function loopOnce() {
  const wait = await poll();
  nextAt = Date.now() + wait * 1000;
  timer = setTimeout(loopOnce, wait * 1000);
}
$('startBtn').onclick = () => {
  stopLoop(); loopOnce();
  $('stopBtn').disabled = false; $('startBtn').disabled = true;
  countdown = setInterval(() => {
    $('pollMeta').textContent = `tracking · next poll ${Math.max(0, Math.round((nextAt - Date.now())/1000))}s`;
  }, 500);
};
function stopLoop() {
  clearTimeout(timer); clearInterval(countdown); timer = countdown = null;
  $('pollMeta').textContent = 'idle';
  $('stopBtn').disabled = true; $('startBtn').disabled = pickedLegs.length === 0;
}
$('stopBtn').onclick = stopLoop;
$('onceBtn').onclick = poll;

// ---- render --------------------------------------------------------------
const LV_NUM = {LEVEL_UNSPECIFIED:0,EMPTY:1,MANY_SEATS_AVAILABLE:2,FEW_SEATS_AVAILABLE:3,STANDING_ROOM_ONLY:4,CRUSHED_STANDING_ROOM_ONLY:5,FULL:6,NOT_ACCEPTING_PASSENGERS:7};
const LV_TEXT = {EMPTY:'empty',MANY_SEATS_AVAILABLE:'many seats',FEW_SEATS_AVAILABLE:'few seats',STANDING_ROOM_ONLY:'standing room',CRUSHED_STANDING_ROOM_ONLY:'crushed',FULL:'full'};
const stopName = id => ctx.stopMeta[id]?.name || id;

function delayChip(leg) {
  if (!leg || leg.delay_seconds === undefined) return '';
  const d = leg.delay_seconds, m = Math.round(Math.abs(d) / 60);
  if (d > 240) return `<span class="chip bad">${m} min late</span>`;
  if (d > 60)  return `<span class="chip warn">${m} min late</span>`;
  if (d < -60) return `<span class="chip ok">${m} min early</span>`;
  return `<span class="chip ok">on time</span>`;
}

function render() {
  const resp = lastResp; if (!resp) return;
  $('raw').textContent = JSON.stringify(resp, null, 1);
  const now = resp.fetched_at_epoch_sec;

  // leg tabs
  $('legtabs').innerHTML = '';
  resp.legs.forEach((leg, i) => {
    const tab = document.createElement('span');
    tab.className = 'legtab' + (i === activeLeg ? ' active' : '');
    tab.textContent = `${pickedLegs[i]?._label || leg.leg_ref} · ${leg.status}`;
    tab.onclick = () => { activeLeg = i; render(); };
    $('legtabs').appendChild(tab);
  });
  const leg = resp.legs[Math.min(activeLeg, resp.legs.length - 1)];
  if (!leg) return;

  // ---- NOW card ----
  let headline = '', sub = '', chips = '';
  const cur = leg.stops?.find(s => s.state === 'CURRENT');
  const next = leg.stops?.find(s => s.state === 'UPCOMING');
  if (leg.status === 'TRACKING') {
    if (cur) headline = `At ${stopName(cur.stop_id)}`;
    else if (next) headline = `Next stop: ${stopName(next.stop_id)}`;
    else headline = 'On the move';
    if (next) sub = `${stopName(next.stop_id)} at ${fmtT(next.estimated_epoch_sec || plannedFor(leg, next.stop_id))}`;
    chips = delayChip(leg);
    if (leg.fleet) chips += `<span class="chip info">${leg.fleet.display_name}${leg.fleet.car_count ? ' · ' + leg.fleet.car_count + ' cars' : ''}</span>`;
    if (leg.vehicle) {
      const age = now - leg.vehicle.measured_at_epoch_sec;
      chips += `<span class="chip ${age > 90 ? 'bad' : 'grey'}">📍 seen ${age}s ago${age > 90 ? ' — STALE' : ''}</span>`;
      if (leg.vehicle.speed_mps !== undefined) chips += `<span class="chip grey">${Math.round(leg.vehicle.speed_mps * 3.6)} km/h</span>`;
    }
  } else if (leg.status === 'NOT_STARTED') {
    const first = leg.stops?.[0];
    headline = 'Not started yet';
    sub = first ? `Departs ${stopName(first.stop_id)} at ${fmtT(first.estimated_epoch_sec || plannedFor(leg, first.stop_id))}` : '';
    chips = `<span class="chip info">scheduled</span>` + delayChip(leg);
  } else {
    headline = { NO_REALTIME:'No live data for this service', ENDED:'Trip completed', EXPIRED:'Trip has ended (link expired)', UPSTREAM_UNAVAILABLE:'NSW feed unavailable — retrying' }[leg.status] || leg.status;
    chips = `<span class="chip grey">${leg.status}</span>`;
  }
  let carsHtml = '';
  if (leg.occupancy?.cars?.length) {
    carsHtml = `<div class="cars">` + leg.occupancy.cars.map(c =>
      `<div class="car lv-${LV_NUM[c.level] ?? 0}" title="${LV_TEXT[c.level] || 'unknown'}">${(c.label || c.sequence).toString().slice(0,4)}</div>`).join('') + `</div>`
      + `<div class="meta">carriage occupancy (front → back)</div>`;
  } else if (leg.occupancy?.overall && leg.occupancy.overall !== 'LEVEL_UNSPECIFIED') {
    carsHtml = `<div class="meta">vehicle occupancy: <b>${LV_TEXT[leg.occupancy.overall] || leg.occupancy.overall}</b></div>`;
  }
  $('nowcard').innerHTML = `<div class="headline">${headline}</div>` +
    (sub ? `<div class="sub">${sub}</div>` : '') +
    `<div style="margin-top:8px">${chips}</div>` + carsHtml;

  // ---- timeline ----
  $('timeline').innerHTML = '';
  (leg.stops || []).forEach(s => {
    const el = document.createElement('div');
    el.className = `tl-stop tl-${s.state}`;
    const planned = plannedFor(leg, s.stop_id);
    const est = s.estimated_epoch_sec || 0;
    let delta = '';
    if (est && planned) {
      const d = Math.round((est - planned) / 60);
      delta = d > 3 ? `<span class="delta verylate">+${d}m</span>` : d > 0 ? `<span class="delta late">+${d}m</span>` : d < 0 ? `<span class="delta early">${d}m</span>` : `<span class="delta ontime">on time</span>`;
    }
    const glyph = s.state === 'CURRENT' ? '●' : s.state === 'DEPARTED' ? '✓' : s.state === 'SKIPPED' ? '✗' : '';
    el.innerHTML =
      `<span class="t">${fmtT(est || planned)}</span>` +
      `<span class="tl-dot"><span>${glyph}</span></span>` +
      `<span class="name">${stopName(s.stop_id)}<span class="sid">${ctx.stopMeta[s.stop_id]?.name ? s.stop_id : ''}</span></span>` +
      (delta || '<span></span>');
    $('timeline').appendChild(el);
  });
  const curEl = $('timeline').querySelector('.tl-CURRENT');
  if (curEl) curEl.scrollIntoView({ block:'center', behavior:'smooth' });

  // ---- map markers ----
  resp.legs.forEach((lg, i) => {
    if (!lg.vehicle) return;
    const pos = [lg.vehicle.latitude, lg.vehicle.longitude];
    const stale = (now - lg.vehicle.measured_at_epoch_sec) > 90;
    const key = lg.leg_ref;
    if (!vehicleMarkers[key]) vehicleMarkers[key] = L.marker(pos).addTo(map);
    vehicleMarkers[key].setLatLng(pos)
      .setIcon(vehicleIcon(lg.vehicle.bearing_degrees, stale))
      .bindTooltip(`${pickedLegs[i]?._label || key} · ${lg.fleet?.display_name || ''}`);
    if (!fitted) { map.setView(pos, 14); fitted = true; }
  });
}

function plannedFor(leg, stopId) { return ctx.planned[leg.leg_ref]?.[stopId] || 0; }
</script>
</body>
</html>
