name: PR Build

on:
  pull_request:
    branches: [main]
  push:
    # Direct pushes to main (rare — usually we go through PRs). The PR
    # build already ran on the PR, but if someone pushes straight to main
    # we still want a green check on the merge commit.
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew :server:build --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: ./gradlew :server:test --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: server/build/reports/tests/test
          retention-days: 7
