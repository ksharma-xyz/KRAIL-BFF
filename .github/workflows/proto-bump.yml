name: proto-bump

# Daily check + manual dispatch. Opens a PR if KRAIL-API-PROTO has a newer
# release tag than the version currently pinned in gradle/libs.versions.toml.
# Never auto-merges — schema changes need a human in the loop, since adding a
# new contract: required field requires a matching response-builder change in
# the BFF.
#
# Proto is consumed as a Maven artifact from GitHub Packages (no submodule).
# The pinned version lives in gradle/libs.versions.toml under `krail-api-proto`.
# Upstream releases are tagged `vX.Y.Z`; this workflow strips the `v` and writes
# the bare X.Y.Z into the version catalog.
#
# When a new tag includes contract: required field additions, the existing
# contract-enforcement unit tests will fail on this auto-bump PR until the
# BFF response builders are updated to populate the new fields.

on:
  schedule:
    # 14:00 UTC daily ≈ 01:00 AEDT / 00:00 AEST. Catches releases cut overnight.
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: proto-bump
  cancel-in-progress: false

env:
  PROTO_REPO: ksharma-xyz/KRAIL-API-PROTO
  VERSION_CATALOG: gradle/libs.versions.toml
  VERSION_KEY: krail-api-proto

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Find latest KRAIL-API-PROTO tag
        id: latest
        run: |
          set -euo pipefail
          # Latest vX.Y.Z tag upstream, sorted by semver (no clone needed).
          latest=$(git ls-remote --tags --refs "https://github.com/${PROTO_REPO}" 'v*.*.*' \
            | awk -F/ '{print $NF}' | sort -V | tail -n1)
          # Currently pinned bare version from the catalog (e.g. 0.4.2).
          # Anchor on the opening quote so we match only the [versions] entry
          # (`krail-api-proto = "X.Y.Z"`), not the [libraries] entry (`= { ... }`).
          current=$(grep -E "^${VERSION_KEY} = \"" "${VERSION_CATALOG}" \
            | sed -E 's/.*"([^"]+)".*/\1/')
          echo "latest=$latest"     >> "$GITHUB_OUTPUT"
          echo "current=$current"   >> "$GITHUB_OUTPUT"
          if [ -z "$latest" ]; then
            echo "::warning::No vX.Y.Z tags found in ${PROTO_REPO} yet."
          fi

      - name: Skip if already at latest
        id: gate
        run: |
          latest="${{ steps.latest.outputs.latest }}"
          current="${{ steps.latest.outputs.current }}"
          if [ -z "$latest" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Reason: no upstream tags exist."
          elif [ "${latest#v}" = "$current" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Reason: already pinned at ${current}."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will bump from ${current} to ${latest#v}."
          fi

      - name: Bump version catalog + open PR
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST: ${{ steps.latest.outputs.latest }}
          PREV: ${{ steps.latest.outputs.current }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          new="${LATEST#v}"
          branch="proto-bump/${LATEST}"

          # Skip if a PR for this version already exists.
          if [ -n "$(gh pr list --state open --search "head:$branch" --json number --jq '[.[].number] | join(" ")')" ]; then
            echo "PR for $branch already open — nothing to do."
            exit 0
          fi

          git switch -c "$branch" 2>/dev/null || git switch "$branch"

          # Rewrite the pinned version in the catalog.
          sed -i -E "s/^(${VERSION_KEY} = \")[^\"]+(\")/\1${new}\2/" "${VERSION_CATALOG}"

          git add "${VERSION_CATALOG}"
          git commit -m "chore(proto): bump KRAIL-API-PROTO to ${new}" || echo "Nothing to commit"
          git push --force-with-lease --set-upstream origin "$branch"

          # Build PR body in a file to dodge YAML pipe-block indentation traps.
          cat > /tmp/pr-body.md <<EOF
          Automated version bump from the daily \`proto-bump\` workflow.

          Bumps \`${VERSION_KEY}\` in \`${VERSION_CATALOG}\` from \`${PREV}\` to \`${new}\`.

          **Diff:** https://github.com/${PROTO_REPO}/compare/v${PREV}...${LATEST}

          **Release notes:** https://github.com/${PROTO_REPO}/releases/tag/${LATEST}

          The existing CI runs on this PR. If a contract-enforcement test fails,
          the new release introduced a \`contract: required\` field that the BFF
          response builders aren't populating yet — fix the builders in this same
          PR before merging.
          EOF

          gh pr create \
            --title "chore(proto): bump KRAIL-API-PROTO to ${new}" \
            --body-file /tmp/pr-body.md \
            --label "dependencies"
