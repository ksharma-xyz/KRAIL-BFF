name: Build Stops Dataset

# Builds the KRAIL stops dataset from NSW GTFS bundles and publishes both
# `stops.pb` and `manifest.json` to a GitHub Release. The KRAIL app reads the
# manifest (via the BFF's redirect endpoint) and downloads the .pb when the
# version changes.
#
# Triggers:
#  - workflow_dispatch (manual; useful for the first run + iteration)
#  - cron: weekly, Sundays 16:00 UTC ≈ Sun 03:00 AEDT / 02:00 AEST
#
# Required secrets:
#  - NSW_API_KEY: Open Data Hub key (server-side only; never goes to the app).
#  - GITHUB_TOKEN: provided automatically by GitHub Actions.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0'

permissions:
  contents: write  # to create releases

concurrency:
  group: stops-dataset
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true   # buildStopsDataset / buildRoutesDataset use the proto schema.

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version tag
        id: ver
        run: echo "version=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch NSW GTFS bundles
        env:
          NSW_API_KEY: ${{ secrets.NSW_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p server/build/gtfs

          fetch() {
            local feed="$1"
            local out="server/build/gtfs/${feed//\//_}.zip"
            echo "Fetching $feed -> $out"
            curl -fsSL \
              -H "Authorization: apikey $NSW_API_KEY" \
              -o "$out" \
              "https://api.transport.nsw.gov.au/v1/gtfs/schedule/$feed" \
              || echo "WARN: $feed fetch failed; continuing"
          }

          # Cover the union of NSW GTFS-static feeds the KRAIL app cares about.
          fetch sydneytrains
          fetch nswtrains
          fetch metro
          fetch lightrail
          fetch ferries/sydneyferries

          ls -la server/build/gtfs

      - name: Build stops dataset
        run: |
          ./gradlew :server:buildStopsDataset \
            -PgtfsDir=server/build/gtfs \
            -Poutput=server/build/dist/stops.pb \
            -Pversion=${{ steps.ver.outputs.version }} \
            -PreleaseUrl=https://github.com/${{ github.repository }}/releases/download/stops-${{ steps.ver.outputs.version }}/stops.pb \
            --no-daemon

      - name: Inspect output
        run: |
          ls -la server/build/dist
          cat server/build/dist/manifest.json
          echo "Dataset size: $(stat -c%s server/build/dist/stops.pb 2>/dev/null || stat -f%z server/build/dist/stops.pb) bytes"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="stops-${{ steps.ver.outputs.version }}"
          gh release create "$tag" \
            --title "Stops dataset $tag" \
            --notes "Generated $(date -u +'%Y-%m-%d %H:%M UTC') from NSW Open Data GTFS." \
            server/build/dist/stops.pb \
            server/build/dist/manifest.json
