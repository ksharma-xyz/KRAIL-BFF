name: CodeQL

# Static security analysis for the Kotlin/Java code. Runs on PR (against main),
# on push to main, and weekly to catch newly-disclosed CVEs in dependencies.
#
# Free for public repositories. Findings appear under Security → Code scanning.

on:
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/codeql.yml'
  push:
    branches: [main]
  schedule:
    # Sundays 10:00 UTC ≈ Sun 21:00 AEDT
    - cron: '0 10 * * 0'

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          # Default queries plus security-extended for fuller coverage.
          queries: security-extended

      - name: Build (manual mode — autobuild can choke on Wire / multi-module setups)
        run: ./gradlew :server:compileKotlin --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
