name: CodeQL

# Static security analysis for the Kotlin/Java code. Runs on PR (against main),
# on push to main, and weekly to catch newly-disclosed CVEs in dependencies.
#
# Free for public repositories. Findings appear under Security → Code scanning.

on:
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/codeql.yml'
  push:
    branches: [main]
  schedule:
    # Sundays 10:00 UTC ≈ Sun 21:00 AEDT
    - cron: '0 10 * * 0'

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: java-kotlin
          # Default queries plus security-extended for fuller coverage.
          queries: security-extended

      - name: Build (manual mode — autobuild can choke on Wire / multi-module setups)
        run: ./gradlew :server:compileKotlin --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:java-kotlin"
