name: Build Datasets

# Builds both the KRAIL stops dataset and the routes dataset from NSW GTFS
# bundles, then publishes them (plus their manifests) to a single GitHub
# Release tagged datasets-YYYYMMDD. The KRAIL app reads each manifest via the
# BFF's redirect endpoints (/v1/data/stops/manifest, /v1/data/routes/manifest)
# and downloads the .pb only when the version changes.
#
# Triggers:
#  - workflow_dispatch (manual; first run + iteration)
#  - cron: weekly, Sundays 16:00 UTC ≈ Mon 03:00 AEDT / 02:00 AEST
#
# Required secrets:
#  - NSW_API_KEY: Open Data Hub key (server-side only; never goes to the app).
#  - GITHUB_TOKEN: provided automatically by GitHub Actions.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0'

permissions:
  contents: write  # to create releases

concurrency:
  group: datasets
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version tag
        id: ver
        run: echo "version=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch NSW GTFS bundles
        env:
          NSW_API_KEY: ${{ secrets.NSW_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p server/build/gtfs

          fetch() {
            local feed="$1"
            local out="server/build/gtfs/${feed//\//_}.zip"
            echo "Fetching $feed -> $out"
            curl -fsSL \
              -H "Authorization: apikey $NSW_API_KEY" \
              -o "$out" \
              "https://api.transport.nsw.gov.au/v1/gtfs/schedule/$feed" \
              || echo "WARN: $feed fetch failed; continuing"
          }

          # Union of NSW GTFS-static feeds the KRAIL app cares about.
          fetch sydneytrains
          fetch nswtrains
          fetch metro
          fetch lightrail
          fetch buses
          fetch ferries/sydneyferries

          ls -la server/build/gtfs

      - name: Build stops dataset
        run: |
          ./gradlew :server:buildStopsDataset \
            -PgtfsDir=server/build/gtfs \
            -Poutput=server/build/dist/stops.pb \
            -Pversion=${{ steps.ver.outputs.version }} \
            -PreleaseUrl=https://github.com/${{ github.repository }}/releases/download/datasets-${{ steps.ver.outputs.version }}/stops.pb \
            --no-daemon

      - name: Build routes dataset
        run: |
          ./gradlew :server:buildRoutesDataset \
            -PgtfsDir=server/build/gtfs \
            -Poutput=server/build/dist/routes.pb \
            -Pversion=${{ steps.ver.outputs.version }} \
            -PreleaseUrl=https://github.com/${{ github.repository }}/releases/download/datasets-${{ steps.ver.outputs.version }}/routes.pb \
            --no-daemon

      - name: Inspect output
        run: |
          ls -la server/build/dist
          echo "--- stops manifest:"
          cat server/build/dist/manifest.json
          echo
          echo "--- routes manifest:"
          cat server/build/dist/routes-manifest.json
          echo
          echo "stops.pb:  $(stat -c%s server/build/dist/stops.pb 2>/dev/null || stat -f%z server/build/dist/stops.pb) bytes"
          echo "routes.pb: $(stat -c%s server/build/dist/routes.pb 2>/dev/null || stat -f%z server/build/dist/routes.pb) bytes"

      - name: Rename manifests for release
        run: |
          # The build tools write `manifest.json` (stops) and `routes-manifest.json` (routes).
          # Rename for clarity in the release; the BFF redirect URLs target these names.
          mv server/build/dist/manifest.json server/build/dist/stops-manifest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="datasets-${{ steps.ver.outputs.version }}"
          gh release create "$tag" \
            --title "KRAIL datasets $tag" \
            --notes "Generated $(date -u +'%Y-%m-%d %H:%M UTC') from NSW Open Data GTFS. Stops + routes for KRAIL local search." \
            server/build/dist/stops.pb \
            server/build/dist/stops-manifest.json \
            server/build/dist/routes.pb \
            server/build/dist/routes-manifest.json
